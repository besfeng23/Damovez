en;align-items:center;gap:14px;text-align:left;animation:itemIn .25s ease both}@keyframes itemIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.left{display:flex;align-items:center;gap:12px;min-width:0}.avatar{width:38px;height:38px;flex:0 0 auto;border-radius:15px;display:grid;place-items:center;color:#061208;font-size:18px;background:linear-gradient(145deg,var(--green2),var(--green));font-weight:950}.info{min-width:0}.symbol{font-size:15px;font-weight:940;display:block}.meta{max-width:195px;color:var(--soft);font-size:12px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:4px}.right{display:grid;justify-items:end;gap:5px;flex-shrink:0}.amount{font-size:15px;font-weight:930;font-variant-numeric:tabular-nums}.tag{height:18px;padding:0 6px;border-radius:6px;background:var(--gs);color:var(--green2);font-size:10px;font-weight:950;display:inline-flex;align-items:center}.tag.hot{background:rgba(230,255,84,.12);color:var(--yellow)}.simple{padding:8px 16px 18px}.title-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px}.title{font-size:29px;font-weight:950;letter-spacing:-.05em}.card{margin-bottom:12px}.card-title{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:920;margin-bottom:11px}.metric{border-radius:16px}.metric span{display:block;color:var(--soft);font-size:12px;font-weight:740;margin-bottom:7px}.metric strong{font-size:18px;letter-spacing:-.035em}.note{color:var(--soft);font-size:12px;line-height:1.45;margin-top:12px}.bottom{position:absolute;left:0;right:0;bottom:0;height:84px;padding:9px 13px 18px;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:rgba(11,25,16,.94);backdrop-filter:blur(24px);border-top:1px solid var(--line)}.nav{display:grid;place-items:center;align-content:center;gap:4px;border-radius:16px;color:var(--soft);font-size:10px;font-weight:830;transition:.16s ease}.nav i{font-size:23px}.nav <body>
<div class="shell"><main class="app"><header class="status"><span id="clock">12:08</span><div class="status-icons"><i class="ph-fill ph-cell-signal-full"></i><i class="ph-fill ph-wifi-high"></i><i class="ph-fill ph-battery-full"></i></div></header><nav class="top"><div class="cluster"><button class="icon" data-action="Menu"><i class="ph ph-list"></i></button><button class="icon" data-action="Help"><i class="ph ph-headphones"></i></button></div><div class="seg"><button data-mode="coin" class="active">Coin</button><button data-mode="earn">Earn</button></div><div class="cluster right"><button class="icon" data-action="Scan"><i class="ph ph-qr-code"></i></button><button class="icon" data-action="Alerts" style="position:relative"><i class="ph ph-bell"></i><span class="badge">2</span></button></div></nav><section class="content" id="content"></section><button class="fab" id="fab"><i class="ph-fill ph-sparkle"></i></button><nav class="bottom" id="bottom"></nav><div class="overlay" id="overlay"><section class="drawer" id="drawer"></section></div><div class="toast" id="toast"><i class="ph-fill ph-info"></i><span id="toastText">Demo only.</span></div></main></div>
<script>
const state={page:'home',mode:'coin',tab:'All',filter:'All',hide:false,coin:12840,points:2450};
const nav=[['home','Home','ph-house'],['campaign','Campaign','ph-megaphone'],['earn','Earn','ph-gift'],['trust','Trust','ph-shield-check'],['profile','Profile','ph-user']];
const tabs=['All','Rewards','Load','Data','Partners'];const filters=['All','New','Popular','Claimed'];
const items=[['+350 SGC','Daily data check-in','Complete a demo check-in','New','ph-wifi-high'],['+900 SGC','5G speed quest','Finish a fictional network challenge','Popular','ph-broadcast'],['+120 SGC','Load booster','Claim a sample prepaid boost','Rewards','ph-device-mobile'],['+500 SGC','Partner perk','Unlock a merchant reward mockup','Partners','ph-storefront']];
const history=[['Daily check-in','Today 8:42 PM','+350 SGC','Claimed','ph-check-circle'],['Speed quest preview','Today 7:10 PM','+900 SGC','Pending','ph-lightning'],['Load boost sample','Yesterday','+120 SGC','Claimed','ph-device-mobile'],['Partner unlock','June 14','+500 SGC','Claimed','ph-storefront']];
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),num=n=>state.hide?'••••':Number(n).toLocaleString('en-US');
function clock(){const n=new Date();$('#clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}function toast(t){$('#toastText').textContent=t;$('#toast').classList.add('show');clearTimeout(window.t);window.t=setTimeout(()=>$('#toast').classList.remove('show'),2200)}
function bottom(){ $('#bottom').innerHTML=nav.map(([k,l,i])=>`<button class="nav ${state.page===k?'active':''}" data-page="${k}"><i class="${state.page===k?'ph-fill':'ph'} ${i}"></i><span>${l}</span></button>`).join('') }
function search(){return `<div class="section search"><button data-action="Search"><span>Search rewards, quests, load perks, partners</span><i class="ph ph-magnifying-glass"></i></button></div>`}
function hero(){return `<div class="section"><div class="pills"><span class="pill demo"><i class="ph-fill ph-warning-circle"></i> Concept demo</span><span class="pill"><i class="ph ph-info"></i> Not affiliated with any telecom</span></div><section class="hero"><div class="hero-head"><div class="brand"><span class="coinmark">S+</span><span><strong>Signal+ Coin</strong><br>telco rewards concept</span></div><div class="cluster"><button class="round" id="privacy"><i class="ph ${state.hide?'ph-eye-closed':'ph-eye'}"></i></button><button class="primary" data-modal="Claim"><i class="ph-bold ph-plus"></i>Claim</button></div></div><div class="balance">${num(state.coin)} SGC</div><div class="sub"><span class="green">+1,370 SGC this week</span><span>fictional rewards only</span></div></section></div>`}
function actions(){return `<section class="actions section">${[['Claim','ph-plus-circle'],['Load','ph-device-mobile'],['Data','ph-wifi-high'],['Quest','ph-flag'],['More','ph-squares-four']].map(([l,i])=>`<button class="action tap" data-modal="${l}"><span class="ico"><i class="ph ${i}"></i></span><span>${l}</span></button>`).join('')}</section>`}
function promo(){return `<div class="section"><section class="promo"><div><div class="eyebrow">Greater with every move</div><h2>Earn fictional Signal+ Coins from data quests, load boosts, and partner perks.</h2><p>Green telco-inspired theme. Original brand. Demo only.</p></div><div class="promo-mark">5G</div></section></div><div class="mini-grid section"><button class="mini tap" data-modal="Data Quest"><h3>Data Quest <i class="ph ph-caret-right"></i></h3><div class="big">+900</div><p class="green">popular challenge</p></button><button class="mini tap" data-modal="Load Boost"><h3>Load Boost <i class="ph ph-caret-right"></i></h3><div class="big">+120</div><p>sample prepaid perk</p></button></div>`}
function tabbar(){return `<div class="tabs">${tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" data-tab="${t}">${t}</button>`).join('')}</div><div class="filters">${filters.map(f=>`<button class="chip ${state.filter===f?'active':''}" data-filter="${f}">${f}</button>`).join('')}</div>`}
function list(){let x=items;if(state.tab!=='All')x=x.filter(i=>i[3]===state.tab||i[3]===state.filter);if(state.filter!=='All')x=x.filter(i=>i[3]===state.filter||state.tab!=='All');return `<section class="list"><div class="list-head"><span>Coin campaigns</span><span>Status</span></div>${x.map((i,n)=>`<button class="item" data-modal="${i[1]}" style="animation-delay:${n*35}ms"><span class="left"><span class="avatar"><i class="ph ${i[4]}"></i></span><span class="info"><span class="symbol">${i[0]}</span><span class="meta">${i[1]} · ${i[2]}</span></span></span><span class="right"><span class="amount">${i[3]}</span><span class="tag ${i[3]==='Popular'?'hot':''}">Demo</span></span></button>`).join('')}</section>`}
function historyList(){return `<section class="list"><div class="list-head"><span>History</span><span>Coins</span></div>${history.map((h,n)=>`<button class="item" data-modal="${h[0]}" style="animation-delay:${n*35}ms"><span class="left"><span class="avatar"><i class="ph ${h[4]}"></i></span><span class="info"><span class="symbol">${h[0]}</span><span class="meta">${h[1]} · ${h[3]}</span></span></span><span class="right"><span class="amount green">${h[2]}</span><span class="tag">${h[3]}</span></span></button>`).join('')}</section>`}
function home(){return `<section class="page">${search()}${hero()}${actions()}${promo()}${tabbar()}${list()}</section>`}
function campaign(){return `<section class="page">${search()}<div class="simple"><div class="title-row"><h1 class="title">Campaign</h1><span class="pill demo">Coin-based</span></div><div class="card"><div class="card-title"><span>Campaign idea</span><i class="ph ph-megaphone"></i></div><p class="note">A fictional telco rewards campaign where users collect SGC from non-real quests, referral mockups, and partner perks.</p></div></div>${tabbar()}${list()}</section>`}
function earn(){return `<section class="page simple"><div class="title-row"><h1 class="title">Earn</h1><span class="pill demo">Demo only</span></div><div class="metrics"><div class="metric"><span>Available</span><strong>${num(state.coin)} SGC</strong></div><div class="metric"><span>Pending</span><strong>${num(state.points)} SGC</strong></div></div><div style="height:14px"></div><button class="primary full" data-modal="Claim preview">Preview claim</button><p class="note">Coins are fictional and have no cash value. This is a UI prototype only.</p></section>`}
function trust(){return `<section class="page simple"><div class="title-row"><h1 class="title">Trust</h1><span class="pill demo">Clear labels</span></div><div class="card"><div class="card-title"><span>Concept safety</span><i class="ph-fill ph-shield-check" style="color:var(--green2)"></i></div><p class="note">This is not an official telecom website, not an investment product, and not a live crypto wallet. It is a fictional rewards coin concept for design review.</p><div class="score"><span></span></div></div><div class="metrics"><div class="metric"><span>Brand status</span><strong>Original</strong></div><div class="metric"><span>Funds</span><strong>None</strong></div></div></section>`}
function profile(){return `<section class="page simple"><div class="title-row"><h1 class="title">Profile</h1><button class="round" id="privacy"><i class="ph ${state.hide?'ph-eye-closed':'ph-eye'}"></i></button></div><div class="card"><div class="card-title"><span>Demo user</span><span class="tag">Level 7</span></div><p class="note">Rewards balance, quests, and history are fictional.</p></div></section>${historyList()}`}
function render(){bottom();$('#content').innerHTML=({home,campaign,earn,trust,profile})[state.page]();$$('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));bind()}
function bind(){$$('[data-page]').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render()});$$('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});$$('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render()});$$('[data-action]').forEach(b=>b.onclick=()=>toast(`${b.dataset.action} is demo-only.`));$$('[data-modal]').forEach(b=>b.onclick=()=>drawer(b.dataset.modal));$$('#privacy').forEach(b=>b.onclick=()=>{state.hide=!state.hide;render();toast(state.hide?'Balance hidden.':'Balance visible.')})}
function drawer(t){$('#drawer').innerHTML=`<div class="handle"></div><div class="drawer-head"><div class="drawer-title"><span class="avatar"><i class="ph ph-coins"></i></span><div><h2>${t}</h2><p>Signal+ Coin concept</p></div></div><button class="round" data-close><i class="ph ph-x"></i></button></div><div class="card"><div class="card-title"><span>${t} preview only</span><i class="ph-fill ph-warning-circle" style="color:var(--yellow)"></i></div><p class="note">This is a fictional rewards coin demo. It does not connect to a telecom account, wallet, exchange, or payment provider.</p></div><button class="primary full" data-close>Understood</button>`;$('#overlay').classList.add('open');$$('[data-close]').forEach(b=>b.onclick=()=>$('#overlay').classList.remove('open'))}
$$('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.page=state.mode==='earn'?'earn':'home';render();toast(`${state.mode==='coin'?'Coin':'Earn'} mode selected.`)});$('#fab').onclick=()=>drawer('AI guide');$('#overlay').onclick=e=>{if(e.target.id==='overlay')$('#overlay').classList.remove('open')};document.onkeydown=e=>{if(e.key==='Escape')$('#overlay').classList.remove('open')};clock();render();setInterval(clock,60000);
</script>
</body>
</html>
