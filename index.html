<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#06130f" />
<title>Smart Telecom Concept Demo</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root{--bg:#020806;--app:#06130f;--panel:#0b1c16;--card:#10281f;--card2:#15352a;--line:rgba(255,255,255,.1);--text:#f6fff9;--soft:#a8bdb2;--muted:#6f8378;--green:#32d16d;--green2:#9cffb8;--gs:rgba(50,209,109,.13);--yellow:#f4cf3d;--blue:#6aa8ff;--red:#ff5b67;--shadow:0 18px 55px rgba(0,0,0,.45);--r24:24px;--r18:18px;--r14:14px;--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden;background:radial-gradient(circle at 50% -18%,rgba(50,209,109,.18),transparent 28%),radial-gradient(circle at 90% 5%,rgba(106,168,255,.12),transparent 25%),var(--bg);font-family:var(--font);color:var(--text)}button{border:0;background:none;color:inherit;font:inherit;cursor:pointer}button:focus-visible{outline:2px solid var(--green);outline-offset:3px}.shell{height:100%;display:grid;place-items:center}.app{width:100%;max-width:430px;height:100%;max-height:900px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 15%),var(--app);box-shadow:0 0 90px rgba(0,0,0,.7);display:flex;flex-direction:column}.status,.top,.bottom{position:relative;z-index:5;flex-shrink:0}.status{height:42px;padding:11px 20px 6px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,19,15,.8);backdrop-filter:blur(18px);font-size:13px;font-weight:760}.status-icons{display:flex;gap:5px}.top{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px;background:rgba(6,19,15,.72);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:10px}.logo{width:36px;height:36px;border-radius:13px;background:linear-gradient(145deg,var(--green2),var(--green));color:#05200f;display:grid;place-items:center;font-weight:950;box-shadow:0 12px 26px rgba(50,209,109,.2)}.brand h1{font-size:16px;letter-spacing:-.02em}.brand p{font-size:11px;color:var(--soft);font-weight:700}.cluster{display:flex;gap:8px}.icon,.round{display:grid;place-items:center;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid var(--line);color:var(--soft);transition:.16s ease}.icon{width:38px;height:38px}.icon i{font-size:21px}.icon:active,.round:active,.tap:active{transform:scale(.95);background:var(--card2)}.content{position:relative;z-index:1;flex:1;overflow:auto;padding-bottom:108px;scrollbar-width:none}.content::-webkit-scrollbar{display:none}.page{animation:in .26s ease both}@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.section{padding:0 16px}.search{padding-top:6px;padding-bottom:12px}.search button{width:100%;height:44px;border-radius:99px;background:rgba(255,255,255,.055);border:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px;color:var(--soft);font-size:14px;font-weight:650;text-align:left}.search i{margin-left:auto}.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.pill{height:26px;display:inline-flex;align-items:center;gap:6px;padding:0 10px;border-radius:99px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--soft);font-size:11px;font-weight:880}.pill.demo{color:var(--green2);background:var(--gs);border-color:rgba(50,209,109,.24)}.hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:var(--r24);padding:18px;background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.02)),var(--panel);box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(50,209,109,.17),transparent 66%)}.hero-head{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:12px}.account{display:flex;align-items:center;gap:8px;color:var(--soft);font-size:13px;font-weight:700}.account strong{color:var(--text);font-weight:920}.account i{color:var(--green);font-size:18px}.balance{position:relative;z-index:1;margin:14px 0 8px;font-size:clamp(34px,8vw,43px);line-height:1;letter-spacing:-.055em;font-weight:950;font-variant-numeric:tabular-nums}.sub{position:relative;z-index:1;display:flex;gap:8px;flex-wrap:wrap;color:var(--soft);font-size:12px;font-weight:700}.green{color:var(--green)}.red{color:var(--red)}.primary,.ghost{height:36px;border-radius:99px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:930;transition:.16s ease}.primary{background:linear-gradient(180deg,var(--green2),var(--green));color:#04210f;box-shadow:0 12px 25px rgba(50,209,109,.18)}.ghost{background:rgba(255,255,255,.065);border:1px solid var(--line);color:var(--text)}.actions{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding-top:16px;padding-bottom:16px}.action{display:grid;place-items:center;gap:7px;color:var(--soft);font-size:11px;font-weight:760}.action .ico{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));border:1px solid var(--line);color:var(--text)}.action i{font-size:21px}.promo{border-radius:var(--r18);padding:16px;border:1px solid rgba(50,209,109,.18);background:linear-gradient(135deg,rgba(50,209,109,.12),rgba(255,255,255,.025)),var(--panel);display:flex;align-items:center;justify-content:space-between;gap:14px}.eyebrow{font-size:11px;font-weight:950;color:var(--green2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}.promo h2{font-size:14px;line-height:1.32;margin-bottom:8px;max-width:260px}.promo p{font-size:12px;color:var(--soft);font-weight:700}.promo-mark{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:var(--green);color:#04210f;font-size:26px;font-weight:950}.grid,.metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid{padding-top:14px;padding-bottom:18px}.card,.metric,.mini{padding:14px;border-radius:var(--r18);border:1px solid var(--line);background:rgba(255,255,255,.042);position:relative;overflow:hidden;text-align:left}.mini{min-height:116px}.mini h3{display:flex;justify-content:space-between;font-size:13px;margin-bottom:12px}.mini .big{font-size:24px;font-weight:950;letter-spacing:-.04em}.mini p,.metric span,.card p{font-size:12px;color:var(--soft);font-weight:700;line-height:1.4}.mini-badge{position:absolute;right:14px;bottom:14px;width:34px;height:34px;border-radius:14px;background:linear-gradient(145deg,var(--green2),var(--green));display:grid;place-items:center;color:#05200f;font-weight:950}.tabs{position:sticky;top:0;z-index:4;display:flex;gap:22px;overflow:auto;padding:0 16px 12px;margin-bottom:12px;border-bottom:1px solid var(--line);background:rgba(6,19,15,.93);backdrop-filter:blur(18px);scrollbar-width:none}.tab{flex:0 0 auto;padding:5px 0 2px;color:var(--soft);font-size:15px;font-weight:800;position:relative}.tab.active{color:var(--text)}.tab.active:after{content:"";position:absolute;left:0;right:0;bottom:-13px;height:2px;border-radius:99px;background:var(--green)}.list{padding:0 16px}.list-head{display:grid;grid-template-columns:1fr auto;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;padding:4px 0 8px}.item{width:100%;min-height:68px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.055);display:flex;justify-content:space-between;align-items:center;gap:14px;text-align:left;animation:in .25s ease both}.left{display:flex;align-items:center;gap:12px;min-width:0}.avatar{width:38px;height:38px;flex:0 0 auto;border-radius:15px;display:grid;place-items:center;color:#fff;font-size:18px;background:var(--card2)}.info{min-width:0}.symbol{font-size:15px;font-weight:920;display:block}.meta{max-width:195px;color:var(--soft);font-size:12px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:4px}.right{display:grid;justify-items:end;gap:5px;flex-shrink:0}.amount{font-size:15px;font-weight:920;font-variant-numeric:tabular-nums}.tag{height:18px;padding:0 6px;border-radius:6px;background:var(--gs);color:var(--green2);font-size:10px;font-weight:950;display:inline-flex;align-items:center}.simple{padding:8px 16px 18px}.title-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px}.title{font-size:29px;font-weight:950;letter-spacing:-.05em}.panel{border-radius:var(--r24);background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));border:1px solid var(--line);padding:16px;margin-bottom:14px}.row{height:54px;border-radius:var(--r14);padding:0 14px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.row span{color:var(--soft);font-size:13px;font-weight:740}.row strong{font-size:18px;font-weight:950}.note{color:var(--soft);font-size:12px;line-height:1.45;margin-top:12px}.bottom{position:absolute;left:0;right:0;bottom:0;height:84px;padding:9px 13px 18px;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:rgba(9,25,20,.94);backdrop-filter:blur(24px);border-top:1px solid var(--line)}.nav{display:grid;place-items:center;align-content:center;gap:4px;border-radius:16px;color:var(--soft);font-size:10px;font-weight:830;transition:.16s ease}.nav i{font-size:23px}.nav.active{color:var(--text);background:rgba(255,255,255,.045)}.nav.active i{color:var(--green);transform:translateY(-1px)}.fab{position:absolute;right:16px;bottom:98px;z-index:7;width:52px;height:52px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,var(--green),#19a858);color:#05200f;border:1px solid rgba(255,255,255,.16);box-shadow:0 14px 35px rgba(0,0,0,.42)}.overlay{position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.58);backdrop-filter:blur(6px);display:none;align-items:flex-end}.overlay.open{display:flex}.drawer{width:100%;max-height:84%;overflow:auto;border-radius:28px 28px 0 0;padding:10px 16px 24px;background:linear-gradient(180deg,rgba(255,255,255,.075),transparent 22%),var(--panel);border-top:1px solid rgba(255,255,255,.14);box-shadow:0 -22px 60px rgba(0,0,0,.55);animation:drawerIn .24s ease both}.handle{width:42px;height:5px;border-radius:99px;background:rgba(255,255,255,.22);margin:0 auto 16px}@keyframes drawerIn{from{transform:translateY(26px);opacity:.72}to{transform:none;opacity:1}}.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.drawer-title{display:flex;align-items:center;gap:12px}.drawer-title h2{font-size:22px;letter-spacing:-.04em;margin-bottom:2px}.drawer-title p{color:var(--soft);font-size:12px;font-weight:700}.full{height:46px;border-radius:var(--r14);font-size:14px;width:100%}.toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);z-index:40;width:calc(100% - 36px);max-width:380px;padding:12px 14px;border-radius:16px;background:rgba(28,45,38,.96);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;gap:9px;align-items:center;color:var(--text);font-size:13px;font-weight:780;opacity:0;pointer-events:none;transition:.22s ease}.toast.show{opacity:1;transform:translateX(-50%)}@media(max-width:360px){.actions{gap:5px}.action .ico{width:41px;height:41px}.meta{max-width:145px}.seg button{padding:0 10px}.balance{font-size:31px}.bottom{padding-left:8px;padding-right:8px}}
</style>
</head>
<body>
<div class="shell"><main class="app"><header class="status"><span id="clock">12:08</span><div class="status-icons"><i class="ph-fill ph-cell-signal-full"></i><i class="ph-fill ph-wifi-high"></i><i class="ph-fill ph-battery-full"></i></div></header><nav class="top"><div class="brand"><div class="logo">S</div><div><h1>Smart Telecom</h1><p>Unofficial concept demo</p></div></div><div class="cluster"><button class="icon" data-action="Scan"><i class="ph ph-qr-code"></i></button><button class="icon" data-action="Alerts"><i class="ph ph-bell"></i></button></div></nav><section class="content" id="content"></section><button class="fab" id="fab"><i class="ph-fill ph-sparkle"></i></button><nav class="bottom" id="bottom"></nav><div class="overlay" id="overlay"><section class="drawer" id="drawer"></section></div><div class="toast" id="toast"><i class="ph-fill ph-info"></i><span id="toastText">Demo only.</span></div></main></div>
<script>
const state={page:'home',tab:'All',hidden:false,data:42.8,points:1280,bill:1499};
const nav=[['home','Home','ph-house'],['plans','Plans','ph-cell-signal-high'],['usage','Usage','ph-chart-line-up'],['rewards','Rewards','ph-gift'],['account','Account','ph-user-circle']];
const tabs=['All','Data','Calls','Bills','Rewards'];
const services=[['5G Data','42.8 GB left','Renews in 12 days','ph-wifi-high','#32d16d'],['Postpaid Plan','Signature Plus 1499','Active account','ph-identification-card','#6aa8ff'],['Rewards','1,280 pts','Ready to redeem','ph-gift','#f4cf3d'],['Broadband','Fiber 600 Mbps','Home connected','ph-router','#9cffb8']];
const activity=[['Data booster added','10GB bonus · Today','Completed','Data','ph-plus-circle'],['Monthly bill ready','Amount due ₱1,499 · Jun 20','Pending','Bills','ph-receipt'],['Reward redeemed','Coffee voucher · Yesterday','Completed','Rewards','ph-gift'],['5G speed test','Makati CBD · 428 Mbps','Completed','Data','ph-gauge']];
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);function money(v){return state.hidden?'••••':'₱'+Number(v).toLocaleString('en-PH')}function toast(t){$('#toastText').textContent=t;$('#toast').classList.add('show');clearTimeout(window.t);window.t=setTimeout(()=>$('#toast').classList.remove('show'),2100)}function clock(){let n=new Date();$('#clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}
function bottom(){ $('#bottom').innerHTML=nav.map(([k,l,i])=>`<button class="nav ${state.page===k?'active':''}" data-page="${k}"><i class="${state.page===k?'ph-fill':'ph'} ${i}"></i><span>${l}</span></button>`).join('') }
function hero(){return `<div class="section"><div class="pills"><span class="pill demo"><i class="ph-fill ph-warning-circle"></i> Unofficial demo</span><span class="pill"><i class="ph-fill ph-shield-check"></i> No real account connected</span></div><section class="hero"><div class="hero-head"><button class="account" data-action="Account selector"><i class="ph-fill ph-sim-card"></i><span><strong>Mobile Plan</strong> · 0919 ••• •482</span></button><div class="cluster"><button class="round" id="privacy"><i class="ph ${state.hidden?'ph-eye-closed':'ph-eye'}"></i></button><button class="primary" data-modal="Pay Bill"><i class="ph-bold ph-receipt"></i>Pay</button></div></div><div class="balance">${state.hidden?'••••':'42.8 GB'}</div><div class="sub"><span>Data remaining</span><span class="green">5G ready</span><span>renews in 12 days</span></div></section></div>`}
function actions(){return `<section class="actions section">${[['Load','ph-plus'],['Data','ph-wifi-high'],['Bill','ph-receipt'],['Roam','ph-airplane-tilt'],['Help','ph-headset']].map(([l,i])=>`<button class="action tap" data-modal="${l}"><span class="ico"><i class="ph ${i}"></i></span><span>${l}</span></button>`).join('')}</section>`}
function promo(){return `<div class="section"><section class="promo"><div><div class="eyebrow">Smart-style telecom concept</div><h2>Manage data, plans, rewards, billing, and support in one premium mobile hub.</h2><p>Prototype only. Not an official Smart app.</p></div><div class="promo-mark">5G</div></section></div><div class="grid section"><button class="mini tap" data-modal="Data Booster"><h3>Data Booster <i class="ph ph-caret-right"></i></h3><div class="big">+10GB</div><p class="green">sample add-on</p><div class="mini-badge"><i class="ph ph-wifi-high"></i></div></button><button class="mini tap" data-modal="Rewards"><h3>Rewards <i class="ph ph-caret-right"></i></h3><div class="big">1,280</div><p>demo points</p><div class="mini-badge">R</div></button></div>`}
function serviceList(){return `<section class="list"><div class="list-head"><span>Services</span><span>Status</span></div>${services.map((s,i)=>`<button class="item" data-modal="${s[0]}" style="animation-delay:${i*35}ms"><span class="left"><span class="avatar" style="background:${s[4]};color:#06130f"><i class="ph ${s[3]}"></i></span><span class="info"><span class="symbol">${s[0]}</span><span class="meta">${s[1]} · ${s[2]}</span></span></span><span class="right"><span class="tag">Active</span></span></button>`).join('')}</section>`}
function activityList(){let rows=activity.filter(a=>state.tab==='All'||a[3]===state.tab);return `<section class="list"><div class="list-head"><span>Activity</span><span>Status</span></div>${rows.map((a,i)=>`<button class="item" data-modal="${a[0]}" style="animation-delay:${i*35}ms"><span class="left"><span class="avatar"><i class="ph ${a[4]}"></i></span><span class="info"><span class="symbol">${a[0]}</span><span class="meta">${a[1]}</span></span></span><span class="right"><span class="tag">${a[2]}</span></span></button>`).join('')}</section>`}
function tabs(){return `<div class="tabs">${tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" data-tab="${t}">${t}</button>`).join('')}</div>`}
function home(){return `<section class="page"><div class="section search"><button data-action="Search"><span>Search plans, promos, rewards, support</span><i class="ph ph-magnifying-glass"></i></button></div>${hero()}${actions()}${promo()}${serviceList()}</section>`}
function plans(){return `<section class="page simple"><div class="title-row"><h1 class="title">Plans</h1><span class="pill demo">Demo catalog</span></div><div class="panel"><div class="card-title"><span>Signature Plus 1499</span><i class="ph ph-cell-signal-high"></i></div><div class="row"><span>Data</span><strong>60GB</strong></div><div class="row"><span>Calls & Texts</span><strong>Unlimited</strong></div><div class="row"><span>Renewal</span><strong>12 days</strong></div><button class="primary full" data-modal="Upgrade Plan">Preview upgrade</button><p class="note">This is a telecom UI concept only.</p></div><div class="grid"><button class="mini" data-modal="Family Plan"><h3>Family Plan</h3><div class="big">4 lines</div><p>shared data concept</p></button><button class="mini" data-modal="Enterprise"><h3>Enterprise</h3><div class="big">Teams</div><p>business account demo</p></button></div></section>`}
function usage(){return `<section class="page simple"><div class="title-row"><h1 class="title">Usage</h1><span class="pill demo">Live-style</span></div><div class="metrics"><div class="metric"><span>Data left</span><strong>${state.hidden?'••••':'42.8GB'}</strong></div><div class="metric"><span>Bill</span><strong>${money(state.bill)}</strong></div></div><div class="card"><div class="card-title"><span>Usage breakdown</span><i class="ph ph-chart-donut"></i></div><p>Streaming 38% · Social 24% · Work 18% · Other 20%</p></div>${tabs()}${activityList()}</section>`}
function rewards(){return `<section class="page simple"><div class="title-row"><h1 class="title">Rewards</h1><span class="pill demo">1,280 pts</span></div><div class="promo"><div><div class="eyebrow">Redeemable demo</div><h2>Coffee, data boosters, ride perks, and partner vouchers.</h2><p>All rewards shown are placeholders.</p></div><div class="promo-mark">R</div></div><div class="grid" style="margin-top:14px"><button class="mini" data-modal="Coffee Voucher"><h3>Coffee Voucher</h3><div class="big">350</div><p>points</p></button><button class="mini" data-modal="Extra Data"><h3>Extra Data</h3><div class="big">500</div><p>points</p></button></div></section>`}
function account(){return `<section class="page simple"><div class="title-row"><h1 class="title">Account</h1><span class="pill demo">Safe demo</span></div><div class="card"><div class="card-title"><span>Unofficial prototype</span><i class="ph-fill ph-shield-check" style="color:var(--green)"></i></div><p>This is a Smart-inspired telecom interface concept. It is not connected to a real Smart account, billing system, SIM profile, or payment provider.</p></div><div class="grid"><button class="mini" data-modal="Profile"><h3>Profile</h3><div class="big">0919</div><p>masked number demo</p></button><button class="mini" data-modal="Support"><h3>Support</h3><div class="big">24/7</div><p>help center concept</p></button></div></section>`}
function render(){bottom();$('#content').innerHTML=({home,plans,usage,rewards,account})[state.page]();bind()}function bind(){$$('[data-page]').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render()});$$('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});$$('[data-action]').forEach(b=>b.onclick=()=>toast(`${b.dataset.action} is demo-only.`));$$('[data-modal]').forEach(b=>b.onclick=()=>drawer(b.dataset.modal));let p=$('#privacy');if(p)p.onclick=()=>{state.hidden=!state.hidden;render();toast(state.hidden?'Private view on':'Private view off')}}
function drawer(t){$('#drawer').innerHTML=`<div class="handle"></div><div class="drawer-head"><div class="drawer-title"><span class="avatar"><i class="ph ph-info"></i></span><div><h2>${t}</h2><p>Prototype preview</p></div></div><button class="round" data-close><i class="ph ph-x"></i></button></div><div class="card"><div class="card-title"><span>${t}</span><i class="ph-fill ph-warning-circle" style="color:var(--green)"></i></div><p>This is a safe concept panel. No live account, billing, subscription, SIM, or provider action is connected.</p></div><button class="primary full" data-close>Understood</button>`;$('#overlay').classList.add('open');$$('[data-close]').forEach(b=>b.onclick=()=>$('#overlay').classList.remove('open'))}
$('#fab').onclick=()=>drawer('AI telecom assistant');$('#overlay').onclick=e=>{if(e.target.id==='overlay')$('#overlay').classList.remove('open')};document.onkeydown=e=>{if(e.key==='Escape')$('#overlay').classList.remove('open')};clock();render();setInterval(clock,60000);
</script>
</body>
</html>
