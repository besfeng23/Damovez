<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Demo Crypto Wallet Interface</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    :root {
      --bg-page: #02040a;
      --bg-base: #090d14;
      --bg-elevated: #111722;
      --bg-card: #151b26;
      --bg-card-soft: #1b2230;
      --bg-chip: #202838;
      --border: rgba(255, 255, 255, 0.075);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text-primary: #f7f9fc;
      --text-secondary: #8f9aaa;
      --text-muted: #5f6877;
      --accent: #f6cf35;
      --accent-soft: rgba(246, 207, 53, 0.12);
      --accent-hover: #d9b82e;
      --green: #16c784;
      --green-soft: rgba(22, 199, 132, 0.12);
      --red: #ea3943;
      --red-soft: rgba(234, 57, 67, 0.12);
      --blue: #5d7cff;
      --purple: #9a6dff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      background:
        radial-gradient(circle at 50% -10%, rgba(246, 207, 53, 0.10), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(93, 124, 255, 0.12), transparent 22%),
        var(--bg-page);
      font-family: var(--font);
      color: var(--text-primary);
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
      background: none;
    }

    button:focus-visible,
    [tabindex]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 880px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 18%),
        var(--bg-base);
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.75);
      display: flex;
      flex-direction: column;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 8%, rgba(246, 207, 53, 0.08), transparent 22%),
        radial-gradient(circle at 92% 18%, rgba(93, 124, 255, 0.08), transparent 24%);
      z-index: 0;
    }

    .status-bar,
    .top-nav,
    .bottom-nav {
      position: relative;
      z-index: 5;
      flex-shrink: 0;
    }

    .status-bar {
      height: 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 20px 7px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
      background: rgba(9, 13, 20, 0.82);
      backdrop-filter: blur(18px);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-primary);
      font-size: 15px;
    }

    .top-nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 8px 16px 10px;
      background: rgba(9, 13, 20, 0.72);
      backdrop-filter: blur(18px);
    }

    .nav-cluster {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-cluster.right {
      justify-content: flex-end;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--text-secondary);
      background: transparent;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
      position: relative;
    }

    .icon-btn i {
      font-size: 22px;
    }

    .icon-btn:active {
      transform: scale(0.92);
      background: var(--bg-chip);
      color: var(--text-primary);
    }

    .notification-dot {
      position: absolute;
      top: 6px;
      right: 5px;
      min-width: 15px;
      height: 15px;
      padding: 0 4px;
      border-radius: 999px;
      background: var(--accent);
      color: #111;
      font-size: 9px;
      font-weight: 900;
      display: grid;
      place-items: center;
      border: 2px solid var(--bg-base);
    }

    .mode-toggle {
      display: flex;
      padding: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .mode-btn {
      height: 30px;
      padding: 0 15px;
      border-radius: 999px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 750;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .mode-btn.active {
      background: var(--bg-card-soft);
      color: var(--text-primary);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 104px;
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar {
      display: none;
    }

    .page {
      animation: pageIn 0.24s ease both;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section {
      padding: 0 16px;
    }

    .search-wrap {
      padding-top: 6px;
      padding-bottom: 12px;
    }

    .search-bar {
      width: 100%;
      height: 44px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 15px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 550;
    }

    .search-bar i {
      font-size: 18px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .demo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .demo-pill,
    .security-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.01em;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.045);
      color: var(--text-secondary);
    }

    .demo-pill {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: rgba(246, 207, 53, 0.22);
    }

    .security-pill i {
      color: var(--green);
      font-size: 14px;
    }

    .hero-card {
      padding: 18px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
        var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -90px;
      top: -90px;
      background: radial-gradient(circle, rgba(246, 207, 53, 0.14), transparent 66%);
      pointer-events: none;
    }

    .wallet-header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .wallet-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 650;
    }

    .wallet-selector strong {
      color: var(--text-primary);
      font-weight: 800;
    }

    .wallet-selector i {
      color: var(--accent);
      font-size: 18px;
    }

    .balance-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .small-round {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .small-round:active {
      transform: scale(0.92);
      background: var(--bg-chip);
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease;
    }

    .primary-btn {
      color: #121212;
      background: var(--accent);
      box-shadow: 0 10px 26px rgba(246, 207, 53, 0.16);
    }

    .secondary-btn {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid var(--border);
    }

    .danger-btn {
      color: #fff;
      background: rgba(234, 57, 67, 0.22);
      border: 1px solid rgba(234, 57, 67, 0.28);
    }

    .primary-btn:active,
    .secondary-btn:active,
    .danger-btn:active {
      transform: scale(0.96);
      opacity: 0.88;
    }

    .balance {
      position: relative;
      z-index: 1;
      font-size: clamp(31px, 8vw, 40px);
      line-height: 1.04;
      letter-spacing: -0.055em;
      font-weight: 850;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .subline {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 650;
    }

    .subline .positive {
      color: var(--green);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .action-item {
      min-width: 0;
      display: grid;
      place-items: center;
      gap: 7px;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 650;
      transition: transform 0.16s ease;
    }

    .action-item:active {
      transform: translateY(1px) scale(0.96);
    }

    .action-icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025));
      border: 1px solid var(--border);
      color: var(--text-primary);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    .action-icon i {
      font-size: 21px;
    }

    .promo-card {
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(246, 207, 53, 0.115), rgba(255, 255, 255, 0.035)),
        var(--bg-card);
      border: 1px solid rgba(246, 207, 53, 0.15);
      overflow: hidden;
      position: relative;
    }

    .promo-card::before {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 140px;
      height: 140px;
      border-radius: 999px;
      background: rgba(246, 207, 53, 0.11);
      filter: blur(3px);
    }

    .promo-copy {
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 850;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .promo-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.32;
      margin-bottom: 9px;
      max-width: 245px;
    }

    .timer {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 650;
    }

    .timer strong {
      color: var(--text-primary);
      font-weight: 850;
    }

    .promo-badge {
      flex: 0 0 auto;
      width: 58px;
      height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #111;
      font-size: 26px;
      font-weight: 950;
      box-shadow: 0 14px 34px rgba(246, 207, 53, 0.18);
      position: relative;
      z-index: 1;
    }

    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      padding: 9px 0 14px;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--text-muted);
    }

    .dot.active {
      width: 15px;
      background: var(--text-primary);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-bottom: 18px;
    }

    .mini-card {
      min-height: 120px;
      padding: 14px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .mini-card h3 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .mini-card h3 i {
      color: var(--text-muted);
      font-size: 16px;
    }

    .mini-value {
      font-size: 23px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }

    .mini-sub {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 650;
    }

    .mini-sub.positive {
      color: var(--green);
    }

    .token-stack {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: flex;
    }

    .token-dot {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #05070c;
      border: 2px solid var(--bg-card);
      color: var(--accent);
      font-size: 11px;
      font-weight: 950;
      margin-left: -8px;
    }

    .earn-mark {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 34px;
      height: 34px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #ff9b3d, #f6cf35);
      color: #111;
      font-weight: 950;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 4;
      display: flex;
      gap: 22px;
      overflow-x: auto;
      padding: 0 16px 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(9, 13, 20, 0.88);
      backdrop-filter: blur(18px);
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      flex: 0 0 auto;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 750;
      white-space: nowrap;
      position: relative;
      padding-top: 5px;
      padding-bottom: 2px;
      transition: color 0.16s ease;
    }

    .tab-btn.active {
      color: var(--text-primary);
    }

    .tab-btn.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -13px;
      height: 2px;
      border-radius: 999px;
      background: var(--accent);
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 16px 12px;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      flex: 0 0 auto;
      height: 31px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      transition: background 0.16s ease, color 0.16s ease, border 0.16s ease, transform 0.16s ease;
    }

    .filter-btn.active {
      color: var(--text-primary);
      background: var(--bg-chip);
      border-color: var(--border);
    }

    .filter-btn:active {
      transform: scale(0.94);
    }

    .list {
      padding: 0 16px;
    }

    .list-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 0 8px;
    }

    .coin-item {
      width: 100%;
      min-height: 68px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      text-align: left;
      animation: itemIn 0.24s ease both;
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .coin-item:active {
      transform: scale(0.985);
    }

    .coin-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .coin-icon {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .coin-info {
      min-width: 0;
    }

    .coin-title {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .symbol {
      font-size: 15px;
      font-weight: 850;
      color: var(--text-primary);
    }

    .tag {
      height: 18px;
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 900;
      color: var(--accent);
      background: var(--accent-soft);
    }

    .coin-meta {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 185px;
    }

    .coin-right {
      display: grid;
      justify-items: end;
      gap: 5px;
      flex: 0 0 auto;
    }

    .price {
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .change {
      height: 24px;
      min-width: 72px;
      padding: 0 8px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .change.up {
      color: var(--green);
      background: var(--green-soft);
    }

    .change.down {
      color: var(--red);
      background: var(--red-soft);
    }

    .flash-up {
      animation: flashUp 0.75s ease;
    }

    .flash-down {
      animation: flashDown 0.75s ease;
    }

    @keyframes flashUp {
      0% {
        color: #fff;
        text-shadow: 0 0 16px var(--green);
      }
      100% {
        color: var(--text-primary);
        text-shadow: none;
      }
    }

    @keyframes flashDown {
      0% {
        color: #fff;
        text-shadow: 0 0 16px var(--red);
      }
      100% {
        color: var(--text-primary);
        text-shadow: none;
      }
    }

    .empty-state {
      margin: 18px 16px 0;
      padding: 28px 18px;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 36px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .empty-state h3 {
      font-size: 16px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.45;
    }

    .simple-page {
      padding: 6px 16px 18px;
    }

    .page-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0 14px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.045em;
    }

    .card {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric {
      padding: 14px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
    }

    .metric span {
      display: block;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    .metric strong {
      font-size: 18px;
      letter-spacing: -0.035em;
    }

    .trade-panel {
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.025));
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 14px;
    }

    .trade-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 54px;
      border-radius: var(--radius-md);
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 10px;
    }

    .trade-row span {
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 700;
    }

    .trade-row strong {
      font-size: 18px;
      font-weight: 900;
    }

    .discover-grid {
      display: grid;
      gap: 12px;
    }

    .discover-card {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .discover-icon {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-size: 22px;
      flex: 0 0 auto;
    }

    .discover-card h3 {
      font-size: 15px;
      margin-bottom: 4px;
    }

    .discover-card p {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.35;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 82px;
      padding: 9px 14px 18px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: rgba(17, 23, 34, 0.92);
      backdrop-filter: blur(22px);
      border-top: 1px solid var(--border);
      box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.3);
    }

    .nav-item {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 4px;
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 750;
      border-radius: 16px;
      transition: color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .nav-item i {
      font-size: 23px;
      transition: transform 0.16s ease;
    }

    .nav-item.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.045);
    }

    .nav-item.active i {
      color: var(--accent);
      transform: translateY(-1px);
    }

    .nav-item:active {
      transform: scale(0.94);
    }

    .floating-btn {
      position: absolute;
      z-index: 7;
      right: 16px;
      bottom: 96px;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(93, 124, 255, 0.9), rgba(154, 109, 255, 0.78));
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.42);
      transition: transform 0.18s ease;
    }

    .floating-btn i {
      font-size: 24px;
    }

    .floating-btn:active {
      transform: scale(0.92) rotate(-4deg);
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(6px);
      display: none;
      align-items: flex-end;
    }

    .overlay.open {
      display: flex;
    }

    .drawer {
      width: 100%;
      max-height: 82%;
      overflow-y: auto;
      border-radius: 28px 28px 0 0;
      padding: 10px 16px 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), transparent 22%),
        var(--bg-elevated);
      border-top: 1px solid var(--border-strong);
      box-shadow: 0 -22px 60px rgba(0, 0, 0, 0.55);
      animation: drawerIn 0.24s ease both;
    }

    @keyframes drawerIn {
      from {
        transform: translateY(26px);
        opacity: 0.7;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .handle {
      width: 42px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      margin: 0 auto 16px;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .drawer-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .drawer-title h2 {
      font-size: 22px;
      letter-spacing: -0.04em;
      margin-bottom: 2px;
    }

    .drawer-title p {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 650;
    }

    .chart {
      width: 100%;
      height: 130px;
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(22, 199, 132, 0.09), transparent),
        rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .chart svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .drawer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .full-btn {
      height: 46px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 900;
    }

    .modal-note {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 12px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%) translateY(10px);
      z-index: 40;
      width: calc(100% - 36px);
      max-width: 370px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(28, 34, 46, 0.95);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 750;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast i {
      color: var(--accent);
      font-size: 18px;
    }

    @media (max-width: 360px) {
      .quick-actions {
        gap: 5px;
      }

      .action-icon {
        width: 41px;
        height: 41px;
      }

      .balance {
        font-size: 31px;
      }

      .coin-meta {
        max-width: 145px;
      }

      .bottom-nav {
        padding-left: 8px;
        padding-right: 8px;
      }
    }

    @media (min-height: 890px) {
      .app {
        border-radius: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <main class="app" id="app" aria-label="Demo crypto wallet app">
      <header class="status-bar">
        <div id="clock">12:08</div>
        <div class="status-icons" aria-label="Device status icons">
          <i class="ph-fill ph-cell-signal-full"></i>
          <i class="ph-fill ph-wifi-high"></i>
          <i class="ph-fill ph-battery-full"></i>
        </div>
      </header>

      <nav class="top-nav" aria-label="Top navigation">
        <div class="nav-cluster">
          <button class="icon-btn" type="button" aria-label="Open menu" data-demo-action="Menu">
            <i class="ph ph-list"></i>
          </button>
          <button class="icon-btn" type="button" aria-label="Support" data-demo-action="Support">
            <i class="ph ph-headphones"></i>
          </button>
        </div>

        <div class="mode-toggle" role="tablist" aria-label="Exchange or wallet mode">
          <button class="mode-btn" type="button" data-mode="exchange" role="tab">Exchange</button>
          <button class="mode-btn active" type="button" data-mode="wallet" role="tab">Wallet</button>
        </div>

        <div class="nav-cluster right">
          <button class="icon-btn" type="button" aria-label="Scan demo QR" data-demo-action="Scanner">
            <i class="ph ph-scan"></i>
          </button>
          <button class="icon-btn" type="button" aria-label="Messages" data-demo-action="Messages">
            <i class="ph ph-chat-teardrop-text"></i>
            <span class="notification-dot">1</span>
          </button>
        </div>
      </nav>

      <section class="content" id="content" aria-live="polite"></section>

      <button class="floating-btn" id="assistantBtn" type="button" aria-label="Open demo assistant">
        <i class="ph-fill ph-sparkle"></i>
      </button>

      <nav class="bottom-nav" aria-label="Main navigation" id="bottomNav"></nav>

      <div class="overlay" id="overlay" aria-hidden="true">
        <section class="drawer" role="dialog" aria-modal="true" aria-label="Demo detail panel" id="drawer"></section>
      </div>

      <div class="toast" id="toast">
        <i class="ph-fill ph-info"></i>
        <span id="toastText">Demo action only.</span>
      </div>
    </main>
  </div>

  <script>
    const state = {
      page: "home",
      mode: "wallet",
      tab: "Trending",
      filter: "All",
      balancesHidden: false,
      promoMinutes: 51,
      balance: 53156.46,
      drawerCoin: null
    };

    const navItems = [
      { key: "home", label: "Home", icon: "ph-house" },
      { key: "markets", label: "Markets", icon: "ph-chart-line-up" },
      { key: "trade", label: "Trade", icon: "ph-arrows-left-right" },
      { key: "discover", label: "Discover", icon: "ph-compass" },
      { key: "assets", label: "Assets", icon: "ph-wallet" }
    ];

    const tabs = ["★", "Holdings", "Trending", "Perps", "Securities", "Predict"];
    const filters = ["All", "BSC", "Solana", "Ethereum", "Base", "Sonic", "1h"];

    const coins = [
      {
        id: "coai",
        symbol: "COAI",
        name: "Compute AI",
        chain: "BSC",
        price: 0.60839,
        decimals: 5,
        change: 10.28,
        volume: "$5.09M",
        marketCap: "$606.11M",
        icon: "ph ph-cpu",
        tag: "5x",
        gradient: "linear-gradient(135deg, #18c9a7, #087e68)",
        chart: "M0,92 C30,72 52,82 82,58 C112,34 136,52 162,28 C190,4 216,25 252,13"
      },
      {
        id: "esports",
        symbol: "ESPORTS",
        name: "Arena Token",
        chain: "Solana",
        price: 0.19527,
        decimals: 5,
        change: -11.28,
        volume: "$1.33M",
        marketCap: "$175.33M",
        icon: "ph ph-game-controller",
        tag: "5x",
        gradient: "linear-gradient(135deg, #3178ff, #111a36)",
        chart: "M0,28 C28,34 52,20 82,44 C111,69 134,56 166,83 C198,108 222,88 252,104"
      },
      {
        id: "spcx",
        symbol: "SPCX",
        name: "SpaceX Community",
        chain: "Base",
        price: 0.000045698,
        decimals: 9,
        change: 12.87,
        volume: "$4.77M",
        marketCap: "$4.59M",
        icon: "ph-fill ph-rocket-launch",
        tag: "Hot",
        gradient: "linear-gradient(135deg, #424b5c, #05070c)",
        chart: "M0,96 C30,90 50,62 82,68 C112,75 130,35 164,42 C199,49 218,19 252,25"
      },
      {
        id: "dgram",
        symbol: "DGRAM",
        name: "Data Gram",
        chain: "Ethereum",
        price: 1.2374,
        decimals: 4,
        change: 6.42,
        volume: "$8.22M",
        marketCap: "$88.40M",
        icon: "ph ph-database",
        tag: "New",
        gradient: "linear-gradient(135deg, #9a6dff, #35206d)",
        chart: "M0,80 C25,76 51,42 79,47 C110,52 132,66 160,38 C192,7 218,22 252,18"
      },
      {
        id: "usds",
        symbol: "USDS",
        name: "Demo Stable",
        chain: "Sonic",
        price: 1.0001,
        decimals: 4,
        change: 0.02,
        volume: "$12.40M",
        marketCap: "$1.03B",
        icon: "ph ph-currency-dollar",
        tag: "Earn",
        gradient: "linear-gradient(135deg, #f6cf35, #c78315)",
        chart: "M0,58 C32,60 55,57 84,58 C116,59 136,56 168,58 C199,60 220,57 252,58"
      }
    ];

    const holdings = [
      { ...coins[4], amount: "1,240.00", value: "$1,240.12" },
      { ...coins[0], amount: "820.50", value: "$499.23" },
      { ...coins[3], amount: "120.00", value: "$148.49" }
    ];

    const $ = (selector) => document.querySelector(selector);
    const content = $("#content");
    const bottomNav = $("#bottomNav");
    const overlay = $("#overlay");
    const drawer = $("#drawer");

    function formatUsd(value, decimals = 2) {
      if (state.balancesHidden) return "••••••";
      return "$" + Number(value).toLocaleString("en-US", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function formatPrice(coin) {
      return "$" + coin.price.toFixed(coin.decimals);
    }

    function showToast(message) {
      $("#toastText").textContent = message;
      $("#toast").classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => $("#toast").classList.remove("show"), 2200);
    }

    function updateClock() {
      const now = new Date();
      $("#clock").textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function renderBottomNav() {
      bottomNav.innerHTML = navItems.map(item => {
        const active = state.page === item.key;
        const weight = active ? "ph-fill" : "ph";
        return `
          <button class="nav-item ${active ? "active" : ""}" type="button" data-page="${item.key}" aria-label="${item.label}" aria-current="${active ? "page" : "false"}">
            <i class="${weight} ${item.icon}"></i>
            <span>${item.label}</span>
          </button>
        `;
      }).join("");

      bottomNav.querySelectorAll("[data-page]").forEach(button => {
        button.addEventListener("click", () => {
          state.page = button.dataset.page;
          render();
        });
      });
    }

    function renderSearch() {
      const text = state.mode === "wallet" ? "Hot Alpha: DGRAM" : "Search markets, tokens, demo pairs";
      return `
        <div class="section search-wrap">
          <button class="search-bar" type="button" aria-label="Search" data-demo-action="Search">
            <span>${text}</span>
            <i class="ph ph-magnifying-glass"></i>
          </button>
        </div>
      `;
    }

    function renderHero() {
      const title = state.mode === "wallet" ? "My Wallet" : "Demo Exchange";
      const subtitle = state.mode === "wallet" ? "Simulated portfolio value" : "Practice trading balance";
      return `
        <div class="section">
          <div class="demo-row">
            <span class="demo-pill"><i class="ph-fill ph-warning-circle"></i> Simulated data</span>
            <span class="security-pill"><i class="ph-fill ph-shield-check"></i> Demo wallet secured</span>
          </div>

          <section class="hero-card">
            <div class="wallet-header">
              <button class="wallet-selector" type="button" aria-label="Wallet selector" data-demo-action="Wallet selector">
                <i class="ph-fill ph-shield-check"></i>
                <span><strong>${title}</strong> · ${subtitle}</span>
                <i class="ph ph-caret-down"></i>
              </button>

              <div class="balance-tools">
                <button class="small-round" type="button" id="privacyBtn" aria-label="Hide or show balance">
                  <i class="ph ${state.balancesHidden ? "ph-eye-closed" : "ph-eye"}"></i>
                </button>
                <button class="primary-btn" type="button" data-modal="Receive">
                  <i class="ph-bold ph-arrow-down"></i>
                  Receive
                </button>
              </div>
            </div>

            <div class="balance" id="mainBalance">${formatUsd(state.balance)}</div>

            <div class="subline">
              <span>1D</span>
              <span class="positive" id="dailyAmount">${state.balancesHidden ? "••••" : "+$15.06"}</span>
              <span class="positive">+0.42%</span>
              <span>Demo mode only</span>
            </div>
          </section>
        </div>
      `;
    }

    function renderActions() {
      const actions = [
        { label: state.mode === "wallet" ? "Send" : "Buy", icon: "ph-arrow-up-right" },
        { label: state.mode === "wallet" ? "Receive" : "Sell", icon: "ph-arrow-down-left" },
        { label: "Convert", icon: "ph-arrows-clockwise" },
        { label: "Earn", icon: "ph-lock-key" },
        { label: "More", icon: "ph-squares-four" }
      ];

      return `
        <section class="quick-actions section" aria-label="Quick actions">
          ${actions.map(action => `
            <button class="action-item" type="button" data-modal="${action.label}" aria-label="${action.label}">
              <span class="action-icon"><i class="ph ${action.icon}"></i></span>
              <span>${action.label}</span>
            </button>
          `).join("")}
        </section>
      `;
    }

    function renderPromos() {
      return `
        <div class="section">
          <section class="promo-card">
            <div class="promo-copy">
              <div class="eyebrow">Demo campaign</div>
              <h2 class="promo-title">Practice trading challenge — learn risk before using real money</h2>
              <div class="timer">
                <span>Ends in</span>
                <strong>6D</strong>
                <span>:</span>
                <strong>15H</strong>
                <span>:</span>
                <strong id="promoMins">${state.promoMinutes}M</strong>
              </div>
            </div>
            <div class="promo-badge">D</div>
          </section>
          <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>

        <div class="mini-grid section">
          <button class="mini-card" type="button" data-demo-action="Meme Rush">
            <h3>Meme Rush <i class="ph ph-caret-right"></i></h3>
            <div class="mini-value">244</div>
            <div class="mini-sub positive"><i class="ph-bold ph-trend-up"></i> demo movers</div>
            <div class="token-stack">
              <span class="token-dot">C</span>
              <span class="token-dot">D</span>
              <span class="token-dot">S</span>
            </div>
          </button>

          <button class="mini-card" type="button" data-demo-action="Earn">
            <h3>Earn <i class="ph ph-caret-right"></i></h3>
            <div class="mini-value">5.66%</div>
            <div class="mini-sub">sample APY</div>
            <div class="earn-mark">$</div>
          </button>
        </div>
      `;
    }

    function getVisibleCoins() {
      let source = state.tab === "Holdings" ? holdings : coins;

      if (state.tab === "Perps") {
        source = coins.filter(coin => Math.abs(coin.change) >= 6);
      }

      if (state.tab === "Securities") {
        source = coins.filter(coin => ["USDS", "DGRAM"].includes(coin.symbol));
      }

      if (state.tab === "Predict") {
        source = [];
      }

      if (state.tab === "★") {
        source = coins.filter(coin => ["COAI", "USDS"].includes(coin.symbol));
      }

      if (!["All", "1h"].includes(state.filter)) {
        source = source.filter(coin => coin.chain === state.filter);
      }

      return source;
    }

    function renderTabsAndFilters() {
      return `
        <div class="tabs" role="tablist" aria-label="Market tabs">
          ${tabs.map(tab => `
            <button class="tab-btn ${state.tab === tab ? "active" : ""}" type="button" data-tab="${tab}" role="tab">
              ${tab}
            </button>
          `).join("")}
        </div>

        <div class="filters" aria-label="Market filters">
          ${filters.map(filter => `
            <button class="filter-btn ${state.filter === filter ? "active" : ""}" type="button" data-filter="${filter}">
              ${filter}${filter === "1h" ? ' <i class="ph ph-caret-down"></i>' : ""}
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderCoinList() {
      const visible = getVisibleCoins();

      if (!visible.length) {
        return `
          <section class="empty-state">
            <i class="ph ph-chart-line"></i>
            <h3>No demo markets here yet</h3>
            <p>This prototype intentionally uses safe fictional data. Try another tab or chain filter.</p>
          </section>
        `;
      }

      return `
        <section class="list">
          <div class="list-header">
            <span>${state.tab === "Holdings" ? "Assets" : "Market"}</span>
            <span>${state.tab === "Holdings" ? "Value" : "Price / 1h"}</span>
          </div>

          ${visible.map((coin, index) => `
            <button class="coin-item" type="button" data-coin="${coin.id}" style="animation-delay:${index * 35}ms">
              <span class="coin-left">
                <span class="coin-icon" style="background:${coin.gradient}">
                  <i class="${coin.icon}"></i>
                </span>
                <span class="coin-info">
                  <span class="coin-title">
                    <span class="symbol">${coin.symbol}</span>
                    <span class="tag">${coin.tag}</span>
                  </span>
                  <span class="coin-meta">
                    ${state.tab === "Holdings" ? `${coin.amount || "0.00"} ${coin.symbol}` : `${coin.volume} · ${coin.marketCap} · ${coin.chain}`}
                  </span>
                </span>
              </span>

              <span class="coin-right">
                <span class="price" id="price-${coin.id}">
                  ${state.tab === "Holdings" && coin.value ? coin.value : formatPrice(coin)}
                </span>
                <span class="change ${coin.change >= 0 ? "up" : "down"}">
                  ${coin.change >= 0 ? "+" : ""}${coin.change.toFixed(2)}%
                </span>
              </span>
            </button>
          `).join("")}
        </section>
      `;
    }

    function renderHome() {
      return `
        <section class="page">
          ${renderSearch()}
          ${renderHero()}
          ${renderActions()}
          ${renderPromos()}
          ${renderTabsAndFilters()}
          ${renderCoinList()}
        </section>
      `;
    }

    function renderMarkets() {
      return `
        <section class="page">
          ${renderSearch()}
          <div class="simple-page">
            <div class="page-title-row">
              <h1 class="page-title">Markets</h1>
              <span class="demo-pill">Demo prices</span>
            </div>
            <div class="metric-grid">
              <div class="metric"><span>Demo volume</span><strong>$31.8M</strong></div>
              <div class="metric"><span>Movers</span><strong>24</strong></div>
            </div>
          </div>
          ${renderTabsAndFilters()}
          ${renderCoinList()}
        </section>
      `;
    }

    function renderTrade() {
      return `
        <section class="page">
          <div class="simple-page">
            <div class="page-title-row">
              <h1 class="page-title">Trade</h1>
              <span class="demo-pill">Practice only</span>
            </div>

            <div class="trade-panel">
              <div class="card-title">
                <span>Demo converter</span>
                <i class="ph ph-arrows-left-right"></i>
              </div>

              <div class="trade-row">
                <span>From</span>
                <strong>USDS</strong>
              </div>

              <div class="trade-row">
                <span>To</span>
                <strong>COAI</strong>
              </div>

              <div class="trade-row">
                <span>Amount</span>
                <strong>$100.00</strong>
              </div>

              <button class="primary-btn full-btn" type="button" data-modal="Preview Trade">
                Preview demo trade
              </button>

              <p class="modal-note">
                No real orders, deposits, withdrawals, private keys, or wallet connections exist in this prototype.
              </p>
            </div>

            <div class="card">
              <div class="card-title">
                <span>Risk reminder</span>
                <i class="ph-fill ph-warning-circle" style="color: var(--accent);"></i>
              </div>
              <p class="modal-note">
                Real crypto trading is high-risk. This interface is intentionally fake and safe for UI testing only.
              </p>
            </div>
          </div>
        </section>
      `;
    }

    function renderDiscover() {
      const items = [
        { title: "Learn before trading", text: "Short demo lessons about volatility, liquidity, and risk.", icon: "ph-graduation-cap" },
        { title: "Security center", text: "Shows how wallet safety patterns should look in a real product.", icon: "ph-shield-check" },
        { title: "Market signals", text: "Fictional alerts for prototype UX only.", icon: "ph-broadcast" },
        { title: "Demo campaigns", text: "Safe promotional cards without real-money claims.", icon: "ph-megaphone" }
      ];

      return `
        <section class="page simple-page">
          <div class="page-title-row">
            <h1 class="page-title">Discover</h1>
            <span class="demo-pill">Safe UX</span>
          </div>

          <div class="discover-grid">
            ${items.map(item => `
              <button class="discover-card" type="button" data-demo-action="${item.title}">
                <span class="discover-icon"><i class="ph ${item.icon}"></i></span>
                <span>
                  <h3>${item.title}</h3>
                  <p>${item.text}</p>
                </span>
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderAssets() {
      return `
        <section class="page">
          <div class="simple-page">
            <div class="page-title-row">
              <h1 class="page-title">Assets</h1>
              <button class="small-round" type="button" id="privacyBtnAssets" aria-label="Hide or show balance">
                <i class="ph ${state.balancesHidden ? "ph-eye-closed" : "ph-eye"}"></i>
              </button>
            </div>

            <section class="hero-card" style="margin-bottom: 14px;">
              <div class="demo-row">
                <span class="demo-pill">Simulated portfolio</span>
              </div>
              <div class="balance">${formatUsd(state.balance)}</div>
              <div class="subline">
                <span class="positive">+$15.06</span>
                <span class="positive">+0.42%</span>
                <span>today</span>
              </div>
            </section>

            <div class="card">
              <div class="card-title">
                <span>Wallet safety</span>
                <i class="ph-fill ph-shield-check" style="color: var(--green);"></i>
              </div>
              <p class="modal-note">
                Demo wallet only. No seed phrase, no private key, no real funds, and no live blockchain actions.
              </p>
            </div>
          </div>

          <div class="tabs" style="position: static;">
            <button class="tab-btn active" type="button">Holdings</button>
            <button class="tab-btn" type="button" data-demo-action="Activity">Activity</button>
            <button class="tab-btn" type="button" data-demo-action="Earn">Earn</button>
          </div>

          <section class="list">
            ${holdings.map((coin, index) => `
              <button class="coin-item" type="button" data-coin="${coin.id}" style="animation-delay:${index * 35}ms">
                <span class="coin-left">
                  <span class="coin-icon" style="background:${coin.gradient}">
                    <i class="${coin.icon}"></i>
                  </span>
                  <span class="coin-info">
                    <span class="coin-title">
                      <span class="symbol">${coin.symbol}</span>
                      <span class="tag">${coin.chain}</span>
                    </span>
                    <span class="coin-meta">${state.balancesHidden ? "••••" : coin.amount + " " + coin.symbol}</span>
                  </span>
                </span>

                <span class="coin-right">
                  <span class="price">${state.balancesHidden ? "••••••" : coin.value}</span>
                  <span class="change ${coin.change >= 0 ? "up" : "down"}">${coin.change >= 0 ? "+" : ""}${coin.change.toFixed(2)}%</span>
                </span>
              </button>
            `).join("")}
          </section>
        </section>
      `;
    }

    function render() {
      renderBottomNav();

      if (state.page === "home") content.innerHTML = renderHome();
      if (state.page === "markets") content.innerHTML = renderMarkets();
      if (state.page === "trade") content.innerHTML = renderTrade();
      if (state.page === "discover") content.innerHTML = renderDiscover();
      if (state.page === "assets") content.innerHTML = renderAssets();

      bindPageEvents();
      updateModeButtons();
    }

    function bindPageEvents() {
      document.querySelectorAll("[data-tab]").forEach(button => {
        button.addEventListener("click", () => {
          state.tab = button.dataset.tab;
          render();
        });
      });

      document.querySelectorAll("[data-filter]").forEach(button => {
        button.addEventListener("click", () => {
          state.filter = button.dataset.filter;
          render();
        });
      });

      document.querySelectorAll("[data-coin]").forEach(button => {
        button.addEventListener("click", () => {
          const coin = coins.find(item => item.id === button.dataset.coin);
          if (coin) openCoinDrawer(coin);
        });
      });

      document.querySelectorAll("[data-modal]").forEach(button => {
        button.addEventListener("click", () => openActionDrawer(button.dataset.modal));
      });

      document.querySelectorAll("[data-demo-action]").forEach(button => {
        button.addEventListener("click", () => showToast(`${button.dataset.demoAction} is demo-only in this prototype.`));
      });

      const privacyButtons = [$("#privacyBtn"), $("#privacyBtnAssets")].filter(Boolean);
      privacyButtons.forEach(button => {
        button.addEventListener("click", () => {
          state.balancesHidden = !state.balancesHidden;
          render();
          showToast(state.balancesHidden ? "Balances hidden." : "Balances visible.");
        });
      });
    }

    function updateModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === state.mode);
      });
    }

    function openOverlay(html) {
      drawer.innerHTML = html;
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");

      drawer.querySelectorAll("[data-close]").forEach(button => {
        button.addEventListener("click", closeOverlay);
      });
    }

    function closeOverlay() {
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
    }

    function openCoinDrawer(coin) {
      const isUp = coin.change >= 0;
      openOverlay(`
        <div class="handle"></div>

        <div class="drawer-head">
          <div class="drawer-title">
            <span class="coin-icon" style="background:${coin.gradient}">
              <i class="${coin.icon}"></i>
            </span>
            <div>
              <h2>${coin.symbol}</h2>
              <p>${coin.name} · ${coin.chain} · simulated market</p>
            </div>
          </div>

          <button class="small-round" type="button" data-close aria-label="Close details">
            <i class="ph ph-x"></i>
          </button>
        </div>

        <div class="balance" style="font-size: 32px; margin-bottom: 4px;">${formatPrice(coin)}</div>
        <div class="subline" style="margin-bottom: 14px;">
          <span class="${isUp ? "positive" : ""}" style="color:${isUp ? "var(--green)" : "var(--red)"}">
            ${isUp ? "+" : ""}${coin.change.toFixed(2)}%
          </span>
          <span>1h demo movement</span>
        </div>

        <div class="chart" aria-label="Fake price chart">
          <svg viewBox="0 0 252 130" preserveAspectRatio="none">
            <defs>
              <linearGradient id="fillGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="${isUp ? "#16c784" : "#ea3943"}" stop-opacity="0.30" />
                <stop offset="100%" stop-color="${isUp ? "#16c784" : "#ea3943"}" stop-opacity="0" />
              </linearGradient>
            </defs>
            <path d="${coin.chart} L252,130 L0,130 Z" fill="url(#fillGradient)"></path>
            <path d="${coin.chart}" fill="none" stroke="${isUp ? "#16c784" : "#ea3943"}" stroke-width="4" stroke-linecap="round"></path>
          </svg>
        </div>

        <div class="metric-grid">
          <div class="metric"><span>Market cap</span><strong>${coin.marketCap}</strong></div>
          <div class="metric"><span>Volume</span><strong>${coin.volume}</strong></div>
        </div>

        <div class="drawer-actions">
          <button class="primary-btn full-btn" type="button" disabled>Demo buy</button>
          <button class="secondary-btn full-btn" type="button" disabled>Demo sell</button>
        </div>

        <p class="modal-note">
          This is a fictional asset detail screen for UI review only. Real trading, wallet connections, deposits, withdrawals, seed phrases, and private keys are intentionally not supported.
        </p>
      `);
    }

    function openActionDrawer(action) {
      openOverlay(`
        <div class="handle"></div>

        <div class="drawer-head">
          <div class="drawer-title">
            <span class="coin-icon" style="background: linear-gradient(135deg, #f6cf35, #8e7216); color: #111;">
              <i class="ph ph-lock-key"></i>
            </span>
            <div>
              <h2>${action}</h2>
              <p>Safe demo action</p>
            </div>
          </div>

          <button class="small-round" type="button" data-close aria-label="Close panel">
            <i class="ph ph-x"></i>
          </button>
        </div>

        <div class="card">
          <div class="card-title">
            <span>${action} is disabled</span>
            <i class="ph-fill ph-shield-warning" style="color: var(--accent);"></i>
          </div>
          <p class="modal-note">
            This prototype does not process money, connect wallets, generate addresses, request seed phrases, or submit trades. This keeps the interface safe and honest while reviewing the product design.
          </p>
        </div>

        <button class="primary-btn full-btn" type="button" data-close>Understood</button>
      `);
    }

    function tickPrices() {
      coins.forEach(coin => {
        const oldPrice = coin.price;
        const volatility = coin.price < 0.001 ? 0.00000008 : coin.price * 0.0018;
        const diff = (Math.random() - 0.48) * volatility;
        coin.price = Math.max(coin.price + diff, 0.000000001);

        const el = document.getElementById(`price-${coin.id}`);
        if (!el) return;

        el.textContent = formatPrice(coin);
        el.classList.remove("flash-up", "flash-down");
        void el.offsetWidth;
        el.classList.add(coin.price >= oldPrice ? "flash-up" : "flash-down");
      });

      if (!state.balancesHidden) {
        state.balance += (Math.random() - 0.48) * 3;
        const balanceEl = $("#mainBalance");
        if (balanceEl) balanceEl.textContent = formatUsd(state.balance);
      }
    }

    function tickPromo() {
      state.promoMinutes -= 1;
      if (state.promoMinutes < 0) state.promoMinutes = 59;
      const el = $("#promoMins");
      if (el) el.textContent = state.promoMinutes + "M";
    }

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        state.page = "home";
        render();
        showToast(`${state.mode === "wallet" ? "Wallet" : "Exchange"} demo mode selected.`);
      });
    });

    $("#assistantBtn").addEventListener("click", () => {
      openActionDrawer("AI assistant");
    });

    overlay.addEventListener("click", event => {
      if (event.target === overlay) closeOverlay();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeOverlay();
    });

    updateClock();
    render();

    setInterval(updateClock, 60000);
    setInterval(tickPrices, 2800);
    setInterval(tickPromo, 60000);
  </script>
</body>
</html>
