function toast(t){$('#toastText').textContent=t;$('#toast').classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>$('#toast').classList.remove('show'),2200)}
function clock(){const n=new Date();$('#clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}
function bottom(){ $('#bottom').innerHTML=nav.map(([key,label,icon])=>`<button class="nav ${state.page===key?'active':''}" data-page="${key}" aria-label="${label}" aria-current="${state.page===key?'page':'false'}"><i class="${state.page===key?'ph-fill':'ph'} ${icon}"></i><span>${label}</span></button>`).join('') }
function search(){return `<div class="section search"><button data-action="Search" aria-label="Search demo markets"><span>${state.mode==='wallet'?'Search assets, activity, demo campaigns':'Search demo pairs and markets'}</span><i class="ph ph-magnifying-glass"></i></button></div>`}
function hero(){const ex=state.mode==='exchange';return `<div class="section"><div class="pills"><span class="pill demo"><i class="ph-fill ph-warning-circle"></i> Demo mode</span><span class="pill safe"><i class="ph-fill ph-shield-check"></i> Simulated wallet secured</span></div><section class="hero"><div class="hero-head"><button class="wallet-id" data-action="Wallet selector"><i class="ph-fill ph-shield-check"></i><span><strong>${ex?'Demo Exchange':'My Wallet'}</strong> · ${ex?'Practice balance':'Simulated portfolio'}</span><i class="ph ph-caret-down"></i></button><div class="cluster"><button class="round-btn" id="privacy" aria-label="Hide or show balance"><i class="ph ${state.hidden?'ph-eye-closed':'ph-eye'}"></i></button><button class="primary" data-modal="Receive"><i class="ph-bold ph-arrow-down"></i>Receive</button></div></div><div class="balance" id="mainBalance">${fmt(state.balance)}</div><div class="sub"><span>1D</span><span class="green">${state.hidden?'••••':'+$5.24'}</span><span class="green">+0.42%</span><span>fictional funds only</span></div></section></div>`}
function actions(){const a=state.mode==='wallet'?[['Send','ph-arrow-up-right'],['Receive','ph-arrow-down-left'],['Convert','ph-arrows-clockwise'],['Earn','ph-lock-key'],['More','ph-squares-four']]:[['Buy','ph-plus-circle'],['Sell','ph-minus-circle'],['Convert','ph-arrows-left-right'],['Orders','ph-list-checks'],['More','ph-squares-four']];return `<section class="actions section">${a.map(([l,i])=>`<button class="action tap" data-modal="${l}" aria-label="${l}"><span class="ico"><i class="ph ${i}"></i></span><span>${l}</span></button>`).join('')}</section>`}
function promo(){return `<div class="section"><section class="promo"><div><div class="eyebrow">Risk-first demo</div><h2>Practice portfolio review without connecting real funds or wallets</h2><div class="timer"><span>Refreshes in</span><strong>6D</strong><span>:</span><strong>15H</strong><span>:</span><strong id="mins">${state.promoMinutes}M</strong></div></div><div class="promo-mark">D</div></section><div class="dots"><span class="on"></span><span></span><span></span><span></span></div></div><div class="mini-grid section"><button class="mini tap" data-action="Meme Rush"><h3>Mover Radar <i class="ph ph-caret-right"></i></h3><div class="big">24</div><p class="green">demo movers tracked</p><div class="stack"><span class="coin-dot">C</span><span class="coin-dot">D</span><span class="coin-dot">S</span></div></button><button class="mini tap" data-action="Earn"><h3>Earn Lab <i class="ph ph-caret-right"></i></h3><div class="big">5.66%</div><p>sample APY only</p><div class="mini-badge">%</div></button></div>`}
function visible(){let s=state.tab==='Holdings'?holdings:coins;if(state.tab==='Perps')s=coins.filter(c=>Math.abs(c.change)>=6);if(state.tab==='Securities')s=coins.filter(c=>['USDS','DGRAM'].includes(c.symbol));if(state.tab==='Predict')s=[];if(state.tab==='★')s=coins.filter(c=>['COAI','USDS'].includes(c.symbol));if(!['All','1h'].includes(state.filter))s=s.filter(c=>c.chain===state.filter);return s}
function tabbar(){return `<div class="tabs" role="tablist">${tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" data-tab="${t}" role="tab">${t}</button>`).join('')}</div><div class="filters">${filters.map(f=>`<button class="chip ${state.filter===f?'active':''}" data-filter="${f}">${f}${f==='1h'?' <i class="ph ph-caret-down"></i>':''}</button>`).join('')}</div>`}
function coinList(){if(state.loading)return `<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>`;const v=visible();if(!v.length)return `<section class="empty"><i class="ph ph-chart-line"></i><h3>No demo markets here</h3><p>This section is intentionally safe and fictional. Try another tab or chain filter.</p></section>`;return `<section class="list"><div class="list-head"><span>${state.tab==='Holdings'?'Assets':'Market'}</span><span>${state.tab==='Holdings'?'Value':'Price / 1h'}</span></div>${v.map((c,i)=>`<button class="coin" data-coin="${c.id}" style="animation-delay:${i*35}ms" aria-label="Open ${c.name} detail"><span class="coin-left"><span class="coin-icon" style="background:${c.grad}"><i class="${c.icon}"></i></span><span class="coin-info"><span class="coin-title"><span class="symbol">${c.symbol}</span><span class="tag">${state.tab==='Holdings'?c.chain:c.tag}</span></span><span class="coin-meta">${state.tab==='Holdings'?`${state.hidden?'••••':c.amount+' '+c.symbol}`:`${c.volume} · ${c.cap} · ${c.chain}`}</span></span></span><span class="coin-right"><span class="price" id="price-${c.id}">${state.tab==='Holdings'&&c.value?(state.hidden?'••••••':c.value):price(c)}</span><span class="change ${c.change>=0?'up':'down'}">${c.change>=0?'+':''}${c.change.toFixed(2)}%</span></span></button>`).join('')}</section>`}
function home(){return `<section class="page">${search()}${hero()}${actions()}${promo()}${tabbar()}${coinList()}</section>`}
function markets(){return `<section class="page">${search()}<div class="simple"><div class="title-row"><h1 class="title">Markets</h1><span class="pill demo">Demo prices</span></div><div class="metrics"><div class="metric"><span>Demo volume</span><strong>$31.8M</strong></div><div class="metric"><span>Movers</span><strong>24</strong></div></div></div>${tabbar()}${coinList()}</section>`}
function trade(){return `<section class="page simple"><div class="title-row"><h1 class="title">Trade</h1><span class="pill demo">Practice only</span></div><div class="trade-panel"><div class="card-title"><span>Demo converter</span><i class="ph ph-arrows-left-right"></i></div><div class="trade-row"><span>From</span><strong>USDS</strong></div><div class="trade-row"><span>To</span><strong>COAI</strong></div><div class="trade-row"><span>Amount</span><strong>$100.00</strong></div><button class="primary full" data-modal="Preview Trade">Preview demo trade</button><p class="note">No orders, deposits, withdrawals, private keys, or wallet connections exist in this prototype.</p></div><div class="card"><div class="card-title"><span>Execution status</span><i class="ph-fill ph-shield-warning" style="color:var(--yellow)"></i></div><p class="note">Every trade button opens a safe demo panel. Nothing leaves this browser.</p></div></section>`}
function discover(){const items=[['Learn before trading','Volatility, liquidity, slippage, and risk basics.','ph-graduation-cap'],['Security center','Demo safety patterns without seed phrases.','ph-shield-check'],['Market signals','Fictional alerts for UX review only.','ph-broadcast'],['Campaigns','Promotional surfaces with safe copy.','ph-megaphone']];return `<section class="page simple"><div class="title-row"><h1 class="title">Discover</h1><span class="pill demo">Safe UX</span></div><div class="discover">${items.map(([h,p,i])=>`<button class="discover-card tap" data-action="${h}"><span class="discover-icon"><i class="ph ${i}"></i></span><span><h3>${h}</h3><p>${p}</p></span></button>`).join('')}</div></section>`}
function assets(){return `<section class="page"><div class="simple"><div class="title-row"><h1 class="title">Assets</h1><button class="round-btn" id="privacy2" aria-label="Hide or show balance"><i class="ph ${state.hidden?'ph-eye-closed':'ph-eye'}"></i></button></div><section class="hero" style="margin-bottom:14px"><div class="pills"><span class="pill demo">Simulated portfolio</span></div><div class="balance">${fmt(state.balance)}</div><div class="sub"><span class="green">${state.hidden?'••••':'+$5.24'}</span><span class="green">+0.42%</span><span>today</span></div></section><div class="card"><div class="card-title"><span>Demo wallet secured</span><i class="ph-fill ph-shield-check" style="color:var(--green)"></i></div><div class="safe-grid"><div class="safe-item"><i class="ph-fill ph-lock-key"></i><strong>No seed phrase</strong><span>Prototype never asks for secrets.</span></div><div class="safe-item"><i class="ph-fill ph-database"></i><strong>Fake data</strong><span>All balances and prices are fictional.</span></div></div></div></div><div class="tabs" style="position:static"><button class="tab active">Holdings</button><button class="tab" data-action="Activity">Activity</button><button class="tab" data-action="Earn">Earn</button></div><section class="list">${holdings.map((c,i)=>`<button class="coin" data-coin="${c.id}" style="animation-delay:${i*35}ms"><span class="coin-left"><span class="coin-icon" style="background:${c.grad}"><i class="${c.icon}"></i></span><span class="coin-info"><span class="coin-title"><span class="symbol">${c.symbol}</span><span class="tag">${c.chain}</span></span><span class="coin-meta">${state.hidden?'••••':c.amount+' '+c.symbol}</span></span></span><span class="coin-right"><span class="price">${state.hidden?'••••••':c.value}</span><span class="change ${c.change>=0?'up':'down'}">${c.change>=0?'+':''}${c.change.toFixed(2)}%</span></span></button>`).join('')}</section></section>`}
function render(){bottom();const pages={home,markets,trade,discover,assets};$('#content').innerHTML=pages[state.page]();$$('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));bind()}
function bind(){ $$('[data-page]').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render()});$$('[data-tab]').forEach(b=>b.onclick=()=>{state.loading=true;state.tab=b.dataset.tab;render();setTimeout(()=>{state.loading=false;render()},250)});$$('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render()});$$('[data-action]').forEach(b=>b.onclick=()=>toast(`${b.dataset.action} is demo-only.`));$$('[data-modal]').forEach(b=>b.onclick=()=>actionDrawer(b.dataset.modal));$$('[data-coin]').forEach(b=>b.onclick=()=>{const c=coins.find(x=>x.id===b.dataset.coin);if(c)coinDrawer(c)});['#privacy','#privacy2'].map($).filter(Boolean).forEach(b=>b.onclick=()=>{state.hidden=!state.hidden;render();toast(state.hidden?'Balances hidden.':'Balances visible.')})}
function open(html){$('#drawer').innerHTML=html;$('#overlay').classList.add('open');$('#overlay').setAttribute('aria-hidden','false');$$('[data-close]').forEach(b=>b.onclick=close)}
function close(){$('#overlay').classList.remove('open');$('#overlay').setAttribute('aria-hidden','true')}
function coinDrawer(c){const up=c.change>=0;open(`<div class="handle"></div><div class="drawer-head"><div class="drawer-title"><span class="coin-icon" style="background:${c.grad}"><i class="${c.icon}"></i></span><div><h2>${c.symbol}</h2><p>${c.name} · ${c.chain} · simulated market</p></div></div><button class="round-btn" data-close aria-label="Close"><i class="ph ph-x"></i></button></div><div class="balance" style="font-size:32px;margin-bottom:4px">${price(c)}</div><div class="sub" style="margin-bottom:14px"><span class="${up?'green':'red'}">${up?'+':''}${c.change.toFixed(2)}%</span><span>1h fictional movement</span><span>${c.risk}</span></div><div class="chart"><svg viewBox="0 0 252 132" preserveAspectRatio="none"><defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${up?'#18c98b':'#f04b55'}" stop-opacity=".30"/><stop offset="100%" stop-color="${up?'#18c98b':'#f04b55'}" stop-opacity="0"/></linearGradient></defs><path d="${c.chart} L252,132 L0,132 Z" fill="url(#g)"></path><path d="${c.chart}" fill="none" stroke="${up?'#18c98b':'#f04b55'}" stroke-width="4" stroke-linecap="round"></path></svg></div><div class="metrics"><div class="metric"><span>Market cap</span><strong>${c.cap}</strong></div><div class="metric"><span>Volume</span><strong>${c.volume}</strong></div></div><div class="drawer-actions"><button class="primary full" disabled>Demo buy</button><button class="ghost full" disabled>Demo sell</button></div><p class="note">This is a fictional asset detail screen. Real trading, deposits, withdrawals, seed phrases, private keys, and wallet connections are intentionally not supported.</p>`)}
function actionDrawer(a){open(`<div class="handle"></div><div class="drawer-head"><div class="drawer-title"><span class="coin-icon" style="background:linear-gradient(135deg,#f0c933,#8d7014);color:#111"><i class="ph ph-lock-key"></i></span><div><h2>${a}</h2><p>Safe demo action</p></div></div><button class="round-btn" data-close aria-label="Close"><i class="ph ph-x"></i></button></div><div class="card"><div class="card-title"><span>${a} is disabled</span><i class="ph-fill ph-shield-warning" style="color:var(--yellow)"></i></div><p class="note">This prototype does not process money, connect wallets, generate deposit addresses, request seed phrases, or submit trades. It is built for safe UI review only.</p></div><button class="primary full" data-close>Understood</button>`)}
function tick(){coins.forEach(c=>{const old=c.price,vol=c.price<.001?.00000008:c.price*.0018;c.price=Math.max(c.price+(Math.random()-.48)*vol,.000000001);const el=document.getElementById('price-'+c.id);if(!el)return;el.textContent=price(c);el.classList.remove('flash-up','flash-down');void el.offsetWidth;el.classList.add(c.price>=old?'flash-up':'flash-down')});if(!state.hidden){state.balance+=(Math.random()-.48)*1.25;const b=$('#mainBalance');if(b)b.textContent=fmt(state.balance)}}
$$('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.page='home';render();toast(`${state.mode==='wallet'?'Wallet':'Exchange'} demo mode selected.`)});
$('#fab').onclick=()=>actionDrawer('AI assistant');$('#overlay').onclick=e=>{if(e.target.id==='overlay')close()};document.onkeydown=e=>{if(e.key==='Escape')close()};clock();render();setInterval(clock,60000);setInterval(tick,2800);setInterval(()=>{state.promoMinutes=state.promoMinutes<=0?59:state.promoMinutes-1;const m=$('#mins');if(m)m.textContent=state.promoMinutes+'M'},60000);
</script>
</body>
</html>
