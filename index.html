<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#070a10" />
<title>DaMovez Mobility Credits Demo</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root{--bg:#02050a;--app:#070a10;--panel:#0f1621;--card:#141d2a;--chip:#202b3b;--line:rgba(255,255,255,.08);--text:#f7f9fc;--soft:#a5afbd;--muted:#687384;--yellow:#f1ca35;--yellow2:#ffe17a;--ys:rgba(241,202,53,.12);--green:#19c98b;--gs:rgba(25,201,139,.12);--red:#ef4c56;--rs:rgba(239,76,86,.12);--blue:#6f8dff;--shadow:0 18px 55px rgba(0,0,0,.44);--r24:24px;--r18:18px;--r14:14px;--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden;background:radial-gradient(circle at 50% -20%,rgba(241,202,53,.13),transparent 28%),radial-gradient(circle at 100% 0,rgba(111,141,255,.11),transparent 28%),var(--bg);font-family:var(--font);color:var(--text)}button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}button:focus-visible{outline:2px solid var(--yellow);outline-offset:3px}.shell{height:100%;display:grid;place-items:center}.app{width:100%;max-width:430px;height:100%;max-height:900px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.035),transparent 17%),var(--app);box-shadow:0 0 90px rgba(0,0,0,.7);display:flex;flex-direction:column}.status,.top,.bottom{position:relative;z-index:5;flex-shrink:0}.status{height:42px;padding:11px 20px 6px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,10,16,.78);backdrop-filter:blur(18px);font-size:13px;font-weight:760}.status-icons{display:flex;gap:5px;font-size:15px}.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px 10px;background:rgba(7,10,16,.72);backdrop-filter:blur(18px)}.cluster{display:flex;align-items:center;gap:9px}.cluster.right{justify-content:flex-end}.icon,.round{display:grid;place-items:center;border-radius:999px;color:var(--soft);transition:.16s ease}.icon{width:38px;height:38px}.icon i{font-size:22px}.round{width:34px;height:34px;background:rgba(255,255,255,.055);border:1px solid var(--line)}.icon:active,.round:active,.tap:active{transform:scale(.94);background:var(--chip)}.badge-dot{position:absolute;top:6px;right:5px;min-width:15px;height:15px;padding:0 4px;border-radius:99px;background:var(--yellow);color:#111;font-size:9px;font-weight:950;display:grid;place-items:center;border:2px solid var(--app)}.seg{display:flex;padding:3px;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:99px}.seg button{height:30px;padding:0 14px;border-radius:99px;color:var(--soft);font-size:13px;font-weight:800;transition:.18s ease}.seg button.active{background:#1a2433;color:var(--text);box-shadow:0 8px 18px rgba(0,0,0,.22)}.content{position:relative;z-index:1;flex:1;overflow:auto;padding-bottom:108px;scrollbar-width:none}.content::-webkit-scrollbar{display:none}.page{animation:pageIn .26s ease both}@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.section{padding:0 16px}.search{padding-top:6px;padding-bottom:12px}.search button{width:100%;height:44px;border:1px solid var(--line);border-radius:99px;background:rgba(255,255,255,.052);display:flex;align-items:center;gap:10px;padding:0 14px;color:var(--soft);font-size:14px;font-weight:650;text-align:left}.search i{margin-left:auto;color:var(--muted);font-size:18px}.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.pill{height:26px;display:inline-flex;align-items:center;gap:6px;padding:0 10px;border-radius:99px;border:1px solid var(--line);background:rgba(255,255,255,.042);color:var(--soft);font-size:11px;font-weight:880;letter-spacing:.01em}.pill.demo{color:var(--yellow2);background:var(--ys);border-color:rgba(241,202,53,.22)}.pill.safe i{color:var(--green)}.hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:var(--r24);padding:18px;background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.022)),var(--panel);box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(241,202,53,.15),transparent 66%)}.hero-head{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px}.wallet-id{display:flex;align-items:center;gap:8px;min-width:0;color:var(--soft);font-size:13px;font-weight:700}.wallet-id strong{color:var(--text);font-weight:900}.wallet-id i{color:var(--yellow);font-size:18px}.balance{position:relative;z-index:1;margin:14px 0 8px;font-size:clamp(33px,8vw,42px);line-height:1;letter-spacing:-.055em;font-weight:950;font-variant-numeric:tabular-nums;transition:.22s ease}.sub{position:relative;z-index:1;display:flex;gap:8px;flex-wrap:wrap;align-items:center;color:var(--soft);font-size:12px;font-weight:700}.green{color:var(--green)}.red{color:var(--red)}.primary,.ghost{height:36px;border-radius:99px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:930;transition:.16s ease}.primary{background:linear-gradient(180deg,var(--yellow2),var(--yellow));color:#111;box-shadow:0 12px 25px rgba(241,202,53,.16)}.ghost{background:rgba(255,255,255,.065);border:1px solid var(--line);color:var(--text)}.actions{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding-top:16px;padding-bottom:16px}.action{display:grid;place-items:center;gap:7px;color:var(--soft);font-size:11px;font-weight:760}.action .ico{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));border:1px solid var(--line);color:var(--text);box-shadow:0 10px 24px rgba(0,0,0,.16)}.action i{font-size:21px}.promo{border-radius:var(--r18);padding:16px;border:1px solid rgba(241,202,53,.16);background:linear-gradient(135deg,rgba(241,202,53,.11),rgba(255,255,255,.025)),var(--panel);display:flex;align-items:center;justify-content:space-between;gap:14px;overflow:hidden}.eyebrow{font-size:11px;font-weight:950;color:var(--yellow2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}.promo h2{font-size:14px;line-height:1.32;margin-bottom:9px;max-width:250px}.promo-mark{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:var(--yellow);color:#111;font-size:26px;font-weight:950}.mini-grid,.metrics,.wallet-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mini-grid{padding-bottom:18px}.mini,.metric,.card,.asset-card{padding:14px;border-radius:var(--r18);border:1px solid var(--line);background:rgba(255,255,255,.042);position:relative;overflow:hidden;text-align:left}.mini{min-height:116px}.mini h3{display:flex;justify-content:space-between;font-size:13px;margin-bottom:12px}.mini .big{font-size:24px;font-weight:950;letter-spacing:-.04em}.mini p,.asset-card p{font-size:12px;color:var(--soft);font-weight:700;margin-top:6px}.mini-badge{position:absolute;right:14px;bottom:14px;width:34px;height:34px;border-radius:14px;background:linear-gradient(145deg,#ffad45,var(--yellow));display:grid;place-items:center;color:#111;font-weight:950}.tabs{position:sticky;top:0;z-index:4;display:flex;gap:22px;overflow:auto;padding:0 16px 12px;margin-bottom:12px;border-bottom:1px solid var(--line);background:rgba(7,10,16,.92);backdrop-filter:blur(18px);scrollbar-width:none}.tab{flex:0 0 auto;padding:5px 0 2px;color:var(--soft);font-size:15px;font-weight:800;position:relative}.tab.active{color:var(--text)}.tab.active:after{content:"";position:absolute;left:0;right:0;bottom:-13px;height:2px;border-radius:99px;background:var(--yellow)}.filters{display:flex;gap:8px;overflow:auto;padding:0 16px 12px;scrollbar-width:none}.chip{height:31px;flex:0 0 auto;padding:0 12px;border-radius:99px;border:1px solid transparent;background:rgba(255,255,255,.04);color:var(--soft);font-size:12px;font-weight:880}.chip.active{background:var(--chip);border-color:var(--line);color:var(--text)}.list{padding:0 16px}.list-head{display:grid;grid-template-columns:1fr auto;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;padding:4px 0 8px}.item{width:100%;min-height:68px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.055);display:flex;justify-content:space-between;align-items:center;gap:14px;text-align:left;animation:itemIn .25s ease both}@keyframes itemIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.left{display:flex;align-items:center;gap:12px;min-width:0}.avatar{width:38px;height:38px;flex:0 0 auto;border-radius:15px;display:grid;place-items:center;color:#fff;font-size:18px;background:var(--chip)}.info{min-width:0}.symbol{font-size:15px;font-weight:920;display:block}.meta{max-width:195px;color:var(--soft);font-size:12px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:4px}.right{display:grid;justify-items:end;gap:5px;flex-shrink:0}.amount{font-size:15px;font-weight:920;font-variant-numeric:tabular-nums}.status-tag{height:18px;padding:0 6px;border-radius:6px;background:var(--ys);color:var(--yellow2);font-size:10px;font-weight:950;display:inline-flex;align-items:center}.status-tag.ok{background:var(--gs);color:var(--green)}.status-tag.fail{background:var(--rs);color:var(--red)}.simple{padding:8px 16px 18px}.title-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px}.title{font-size:29px;font-weight:950;letter-spacing:-.05em}.card{margin-bottom:12px}.card-title{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:920;margin-bottom:11px}.metric{border-radius:var(--r14)}.metric span{display:block;color:var(--soft);font-size:12px;font-weight:740;margin-bottom:7px}.metric strong,.asset-card strong{font-size:18px;letter-spacing:-.035em}.pay-panel{border-radius:var(--r24);background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));border:1px solid var(--line);padding:16px;margin-bottom:14px}.pay-row{height:54px;border-radius:var(--r14);padding:0 14px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.pay-row span{color:var(--soft);font-size:13px;font-weight:740}.pay-row strong{font-size:18px;font-weight:950}.note{color:var(--soft);font-size:12px;line-height:1.45;margin-top:12px}.bottom{position:absolute;left:0;right:0;bottom:0;height:84px;padding:9px 13px 18px;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:rgba(15,21,31,.94);backdrop-filter:blur(24px);border-top:1px solid var(--line)}.nav{display:grid;place-items:center;align-content:center;gap:4px;border-radius:16px;color:var(--soft);font-size:10px;font-weight:830;transition:.16s ease}.nav i{font-size:23px}.nav.active{color:var(--text);background:rgba(255,255,255,.045)}.nav.active i{color:var(--yellow);transform:translateY(-1px)}.fab{position:absolute;right:16px;bottom:98px;z-index:7;width:52px;height:52px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,rgba(111,141,255,.96),rgba(154,109,255,.78));color:white;border:1px solid rgba(255,255,255,.16);box-shadow:0 14px 35px rgba(0,0,0,.42)}.overlay{position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.58);backdrop-filter:blur(6px);display:none;align-items:flex-end}.overlay.open{display:flex}.drawer{width:100%;max-height:84%;overflow:auto;border-radius:28px 28px 0 0;padding:10px 16px 24px;background:linear-gradient(180deg,rgba(255,255,255,.075),transparent 22%),var(--panel);border-top:1px solid rgba(255,255,255,.14);box-shadow:0 -22px 60px rgba(0,0,0,.55);animation:drawerIn .24s ease both}.handle{width:42px;height:5px;border-radius:99px;background:rgba(255,255,255,.22);margin:0 auto 16px}@keyframes drawerIn{from{transform:translateY(26px);opacity:.72}to{transform:none;opacity:1}}.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.drawer-title{display:flex;align-items:center;gap:12px;min-width:0}.drawer-title h2{font-size:22px;letter-spacing:-.04em;margin-bottom:2px}.drawer-title p{color:var(--soft);font-size:12px;font-weight:700}.full{height:46px;border-radius:var(--r14);font-size:14px;width:100%}.toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);z-index:40;width:calc(100% - 36px);max-width:380px;padding:12px 14px;border-radius:16px;background:rgba(28,35,48,.96);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;gap:9px;align-items:center;color:var(--text);font-size:13px;font-weight:780;opacity:0;pointer-events:none;transition:.22s ease}.toast.show{opacity:1;transform:translateX(-50%)}.safe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.safe-item{padding:12px;border-radius:14px;background:rgba(255,255,255,.038);border:1px solid var(--line)}.safe-item i{color:var(--green);font-size:20px;margin-bottom:8px}.safe-item strong{display:block;font-size:13px}.safe-item span{display:block;margin-top:4px;color:var(--soft);font-size:11px;line-height:1.35}.score{height:8px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:10px}.score span{display:block;height:100%;width:92%;background:linear-gradient(90deg,var(--green),var(--yellow))}@media(max-width:360px){.actions{gap:5px}.action .ico{width:41px;height:41px}.meta{max-width:145px}.bottom{padding-left:8px;padding-right:8px}.seg button{padding:0 10px}.balance{font-size:31px}}@media(min-height:900px){.app{border-radius:34px;height:calc(100% - 18px)}}
</style>

<body>
<div class="shell"><main class="app"><header class="status"><span id="clock">12:08</span><div class="status-icons"><i class="ph-fill ph-cell-signal-full"></i><i class="ph-fill ph-wifi-high"></i><i class="ph-fill ph-battery-full"></i></div></header><nav class="top"><div class="cluster"><button class="icon" data-action="Menu"><i class="ph ph-list"></i></button><button class="icon" data-action="Support"><i class="ph ph-headphones"></i></button></div><div class="seg"><button data-mode="mobility" class="active">Mobility</button><button data-mode="lab">Lab</button></div><div class="cluster right"><button class="icon" data-action="Scan QR"><i class="ph ph-qr-code"></i></button><button class="icon" data-action="Notifications" style="position:relative"><i class="ph ph-bell"></i><span class="badge-dot">2</span></button></div></nav><section class="content" id="content"></section><button class="fab" id="fab"><i class="ph-fill ph-sparkle"></i></button><nav class="bottom" id="bottom"></nav><div class="overlay" id="overlay"><section class="drawer" id="drawer"></section></div><div class="toast" id="toast"><i class="ph-fill ph-info"></i><span id="toastText">Demo only.</span></div></main></div>
<script>
const state={page:'home',mode:'mobility',tab:'All',filter:'All',hidden:false,balance:1842.75,rideCredits:420,rewards:186.5};
const nav=[['home','Home','ph-house'],['ride','Ride','ph-car'],['activity','Activity','ph-receipt'],['security','Security','ph-shield-check'],['assets','Assets','ph-wallet']];
const tabs=['All','Credits','Rides','Rewards','Lab'];const filters=['All','Completed','Pending','Failed'];
const items=[['PHP','Peso Credits','Main demo credits','₱1,842.75','ph-currency-circle-dollar','#f1ca35'],['RIDE','Ride Credits','Mobility fare credits','₱420.00','ph-car','#19c98b'],['RWDS','Rewards','Loyalty credits','₱186.50','ph-gift','#9a6dff'],['LAB','Market Lab','Learning balance','$1.00','ph-flask','#6f8dff']];
const txs=[['Ride used','Quiapo → BGC · Today 8:42 PM','-₱186.00','Completed','Rides','ph-car','ok'],['Credits added','Sandbox reference · Today 7:10 PM','+₱1,000.00','Pending','Credits','ph-arrow-down','pending'],['Reward earned','Peak-hour mobility reward · Yesterday','+₱42.50','Completed','Rewards','ph-gift','ok'],['Ride preview failed','Insufficient ride credits · Yesterday','₱0.00','Failed','Rides','ph-warning','fail']];
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),peso=v=>state.hidden?'••••••':'₱'+Number(v).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(t){$('#toastText').textContent=t;$('#toast').classList.add('show');clearTimeout(window.t);window.t=setTimeout(()=>$('#toast').classList.remove('show'),2200)}function clock(){const n=new Date();$('#clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}
function bottom(){ $('#bottom').innerHTML=nav.map(([k,l,i])=>`<button class="nav ${state.page===k?'active':''}" data-page="${k}"><i class="${state.page===k?'ph-fill':'ph'} ${i}"></i><span>${l}</span></button>`).join('') }
function search(){return `<div class="section search"><button data-action="Search"><span>Search rides, credits, receipts, rewards</span><i class="ph ph-magnifying-glass"></i></button></div>`}
function hero(){return `<div class="section"><div class="pills"><span class="pill demo"><i class="ph-fill ph-warning-circle"></i> Demo environment</span><span class="pill safe"><i class="ph-fill ph-shield-check"></i> Sandbox only</span></div><section class="hero"><div class="hero-head"><button class="wallet-id" data-action="Credit selector"><i class="ph-fill ph-wallet"></i><span><strong>PHP Mobility Credits</strong> · rides and rewards</span></button><div class="cluster"><button class="round" id="privacy"><i class="ph ${state.hidden?'ph-eye-closed':'ph-eye'}"></i></button><button class="primary" data-modal="Add Credits"><i class="ph-bold ph-plus"></i>Add</button></div></div><div class="balance" id="mainBalance">${peso(state.balance)}</div><div class="sub"><span>Today</span><span class="green">${state.hidden?'••••':'+₱42.50'}</span><span>simulated ledger only</span></div></section></div>`}
function actions(){return `<section class="actions section">${[['Book','ph-car'],['Add','ph-plus'],['Send','ph-paper-plane-tilt'],['Rewards','ph-gift'],['More','ph-squares-four']].map(([l,i])=>`<button class="action tap" data-modal="${l}"><span class="ico"><i class="ph ${i}"></i></span><span>${l}</span></button>`).join('')}</section>`}
function promo(){return `<div class="section"><section class="promo"><div><div class="eyebrow">Philippine mobility app</div><h2>One premium demo balance for rides, fare credits, rewards, and learning mode</h2></div><div class="promo-mark">₱</div></section></div><div class="mini-grid section" style="margin-top:14px"><button class="mini tap" data-modal="Ride Credits"><h3>Ride Credits <i class="ph ph-caret-right"></i></h3><div class="big">${state.hidden?'••••':peso(state.rideCredits)}</div><p class="green">ready for demo fare</p><div class="mini-badge"><i class="ph ph-car"></i></div></button><button class="mini tap" data-modal="Rewards"><h3>Rewards <i class="ph ph-caret-right"></i></h3><div class="big">${state.hidden?'••••':peso(state.rewards)}</div><p>loyalty credits</p><div class="mini-badge">R</div></button></div>`}
function tabbar(){return `<div class="tabs">${tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" data-tab="${t}">${t}</button>`).join('')}</div><div class="filters">${filters.map(f=>`<button class="chip ${state.filter===f?'active':''}" data-filter="${f}">${f}</button>`).join('')}</div>`}
function visibleTx(){let x=txs;if(state.tab!=='All'&&state.tab!=='Lab')x=x.filter(t=>t[4]===state.tab);if(['Completed','Pending','Failed'].includes(state.filter))x=x.filter(t=>t[3]===state.filter);return x}
function txList(limit=5){let x=visibleTx().slice(0,limit);return `<section class="list"><div class="list-head"><span>Activity</span><span>Status</span></div>${x.map((t,i)=>`<button class="item" data-modal="${t[0]}" style="animation-delay:${i*35}ms"><span class="left"><span class="avatar"><i class="ph ${t[5]}"></i></span><span class="info"><span class="symbol">${t[0]}</span><span class="meta">${t[1]}</span></span></span><span class="right"><span class="amount ${t[2][0]==='+'?'green':t[2][0]==='-'?'red':''}">${state.hidden?'••••':t[2]}</span><span class="status-tag ${t[6]}">${t[3]}</span></span></button>`).join('')}</section>`}
function assetList(){return `<section class="list"><div class="list-head"><span>Assets</span><span>Balance</span></div>${items.map((a,i)=>`<button class="item" data-modal="${a[1]}" style="animation-delay:${i*35}ms"><span class="left"><span class="avatar" style="background:${a[5]}"><i class="ph ${a[4]}"></i></span><span class="info"><span class="symbol">${a[0]}</span><span class="meta">${a[1]} · ${a[2]}</span></span></span><span class="right"><span class="amount">${state.hidden?'••••':a[3]}</span><span class="status-tag ok">Demo</span></span></button>`).join('')}</section>`}
function home(){return `<section class="page">${search()}${hero()}${actions()}${promo()}<div class="simple"><div class="title-row"><h1 class="title" style="font-size:22px">Recent activity</h1><button class="ghost" data-page="activity">View all</button></div></div>${txList(3)}<div style="height:16px"></div>${assetList()}</section>`}
function ride(){return `<section class="page simple"><div class="title-row"><h1 class="title">Ride</h1><span class="pill demo">Demo booking</span></div><div class="pay-panel"><div class="card-title"><span>Ride preview</span><i class="ph ph-car"></i></div><div class="pay-row"><span>Route</span><strong>Quiapo → BGC</strong></div><div class="pay-row"><span>Fare estimate</span><strong>₱186.00</strong></div><div class="pay-row"><span>Source</span><strong>Mobility Credits</strong></div><button class="primary full" data-modal="Confirm Ride">Preview ride</button><p class="note">This does not book a ride. It only shows the product flow.</p></div></section>`}
function activity(){return `<section class="page">${search()}<div class="simple"><div class="title-row"><h1 class="title">Activity</h1><span class="pill demo">Ledger-style</span></div></div>${tabbar()}${txList(20)}</section>`}
function security(){return `<section class="page simple"><div class="title-row"><h1 class="title">Security</h1><span class="pill safe"><i class="ph-fill ph-shield-check"></i> 92/100</span></div><div class="card"><div class="card-title"><span>Demo environment active</span><i class="ph-fill ph-shield-check" style="color:var(--green)"></i></div><p class="note">No live provider is connected. Every action is sandbox-only and every balance is fictional.</p><div class="score"><span></span></div></div><div class="safe-grid"><div class="safe-item"><i class="ph-fill ph-lock-key"></i><strong>Safe demo</strong><span>No sensitive credentials are requested.</span></div><div class="safe-item"><i class="ph-fill ph-database"></i><strong>Fake ledger</strong><span>Every transaction is simulated.</span></div><div class="safe-item"><i class="ph-fill ph-device-mobile"></i><strong>Device demo</strong><span>Status indicators are UI-only.</span></div><div class="safe-item"><i class="ph-fill ph-warning-circle"></i><strong>Clear labels</strong><span>Learning mode is separated.</span></div></div></section>`}
function assets(){return `<section class="page"><div class="simple"><div class="title-row"><h1 class="title">Assets</h1><button class="round" id="privacy2"><i class="ph ${state.hidden?'ph-eye-closed':'ph-eye'}"></i></button></div><div class="metrics"><div class="metric"><span>Main Credits</span><strong>${peso(state.balance)}</strong></div><div class="metric"><span>Ride Credits</span><strong>${state.hidden?'••••':peso(state.rideCredits)}</strong></div></div></div>${assetList()}</section>`}
function render(){bottom();$('#content').innerHTML=({home,ride,activity,security,assets})[state.page]();$$('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));bind()}
function bind(){$$('[data-page]').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render()});$$('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});$$('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render()});$$('[data-action]').forEach(b=>b.onclick=()=>toast(`${b.dataset.action} is demo-only.`));$$('[data-modal]').forEach(b=>b.onclick=()=>drawer(b.dataset.modal));['#privacy','#privacy2'].map($).filter(Boolean).forEach(b=>b.onclick=()=>{state.hidden=!state.hidden;render();toast(state.hidden?'Balances hidden.':'Balances visible.')})}
function drawer(t){$('#drawer').innerHTML=`<div class="handle"></div><div class="drawer-head"><div class="drawer-title"><span class="avatar"><i class="ph ph-shield-check"></i></span><div><h2>${t}</h2><p>Sandbox preview</p></div></div><button class="round" data-close><i class="ph ph-x"></i></button></div><div class="card"><div class="card-title"><span>${t} preview only</span><i class="ph-fill ph-warning-circle" style="color:var(--yellow)"></i></div><p class="note">This prototype is for product review only. It does not connect to live services or create real transactions.</p></div><button class="primary full" data-close>Understood</button>`;$('#overlay').classList.add('open');$$('[data-close]').forEach(b=>b.onclick=()=>$('#overlay').classList.remove('open'))}
$$('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.page=state.mode==='lab'?'assets':'home';render();toast(`${state.mode==='mobility'?'Mobility':'Learning Lab'} selected.`)});$('#fab').onclick=()=>drawer('AI assistant');$('#overlay').onclick=e=>{if(e.target.id==='overlay')$('#overlay').classList.remove('open')};document.onkeydown=e=>{if(e.key==='Escape')$('#overlay').classList.remove('open')};function tick(){if(!state.hidden){state.balance+=(Math.random()-.48)*.8;const b=$('#mainBalance');if(b)b.textContent=peso(state.balance)}}clock();render();setInterval(clock,60000);setInterval(tick,3000);
</script>
</body>
</html>
